<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>HabitDuel 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0fdf6;--s1:#ffffff;--s2:#f5fdf9;--s3:#edfbf4;
  --p1:#f59e0b;--p1d:#d97706;--p1l:#fef3c7;
  --p2:#10b981;--p2d:#059669;--p2l:#d1fae5;
  --acc:#f43f5e;--mint:#6ee7b7;--mintd:#34d399;
  --txt:#1a3a2a;--txt2:#4a7a5a;--txt3:#8abf9a;--txt4:#b8d4c0;
  --bdr:#c6f0da;--r:16px;--rs:10px;
  --sh:0 2px 12px #10b98115;--sh2:0 4px 24px #10b98122;
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Nunito',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-100px;right:-100px;width:350px;height:350px;background:radial-gradient(circle,#bbf7d060 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-80px;left:-80px;width:280px;height:280px;background:radial-gradient(circle,#fef9c360 0%,transparent 70%);pointer-events:none;z-index:0;}
#fw{position:fixed;inset:0;pointer-events:none;z-index:9999;}
.screen{position:relative;z-index:1;display:none;min-height:100vh;padding:1.25rem 1rem 5rem;}
.screen.on{display:block;}
.maxw{max-width:500px;margin:0 auto;}
.fredoka{font-family:'Fredoka One',cursive;}
.card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;box-shadow:var(--sh);}
.card+.card{margin-top:.75rem;}
.btn{border:none;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--p2);color:#fff;padding:14px 20px;font-size:16px;width:100%;border-radius:var(--r);box-shadow:0 4px 0 var(--p2d);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--p2d);}
.btn-amber{background:var(--p1);color:#fff;padding:14px 20px;font-size:16px;width:100%;border-radius:var(--r);box-shadow:0 4px 0 var(--p1d);}
.btn-amber:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--p1d);}
.btn-ghost{background:transparent;border:1.5px solid var(--bdr);color:var(--txt2);padding:8px 14px;font-size:13px;border-radius:var(--rs);}
.btn-ghost:hover{background:var(--s3);}
.btn-sm{padding:7px 13px;font-size:12px;}
.fi{width:100%;background:var(--s2);border:1.5px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-family:'Nunito',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border .2s,box-shadow .2s;}
.fi:focus{border-color:var(--p2);box-shadow:0 0 0 3px #6ee7b750;}
.fi.amber:focus{border-color:var(--p1);box-shadow:0 0 0 3px #fde68a60;}
select.fi{cursor:pointer;}
.label{font-size:11px;color:var(--txt2);font-weight:800;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.field{margin-bottom:12px;}
/* CATS */
.cat-pill{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:800;border:1.5px solid;}
.cat-fitness{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.cat-reading{background:#eff6ff;color:#1e40af;border-color:#93c5fd;}
.cat-health{background:#f0fdf4;color:#166534;border-color:#86efac;}
.cat-mindfulness{background:#fdf4ff;color:#6b21a8;border-color:#d8b4fe;}
.cat-creativity{background:#fff7ed;color:#9a3412;border-color:#fdba74;}
.cat-social{background:#fdf2f8;color:#9d174d;border-color:#f9a8d4;}
.cat-other{background:#f8fafc;color:#475569;border-color:#cbd5e1;}
/* TABS */
.tabs{display:flex;background:var(--s2);border-radius:var(--r);padding:4px;margin-bottom:1rem;border:1.5px solid var(--bdr);}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:800;color:var(--txt3);border-radius:12px;cursor:pointer;transition:all .2s;}
.tab.active{background:#fff;color:var(--p2d);box-shadow:var(--sh);}
/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--bdr);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 2px 8px;font-size:9px;font-weight:800;color:var(--txt3);cursor:pointer;transition:color .2s;gap:3px;}
.bnav-item.active{color:var(--p2d);}
.bnav-icon{font-size:19px;line-height:1;}
/* LANDING */
.land{max-width:420px;margin:0 auto;text-align:center;padding-top:8vh;}
.biglogo{font-family:'Fredoka One',cursive;font-size:52px;line-height:1;color:var(--p2);margin-bottom:4px;}
.biglogo span{color:var(--p1);}
.tagline{color:var(--txt2);font-size:14px;margin-bottom:2rem;font-weight:700;}
.divider{text-align:center;color:var(--txt3);font-size:13px;margin:.75rem 0;font-weight:700;}
/* SETUP */
.setup-steps{display:flex;gap:6px;margin-bottom:1.25rem;justify-content:center;}
.step-dot{width:28px;height:6px;border-radius:3px;background:var(--bdr);}
.step-dot.done{background:var(--p2);}
.step-dot.active{background:var(--mintd);}
.step-title{font-family:'Fredoka One',cursive;font-size:22px;color:var(--txt);margin-bottom:4px;}
.step-sub{font-size:13px;color:var(--txt2);font-weight:700;margin-bottom:1.25rem;}
.hbrow{background:var(--s2);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;}
.hbrow-top{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.hbrow-top input{flex:1;background:#fff;border:1.5px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:8px 11px;outline:none;}
.hbrow-top input:focus{border-color:var(--p2);}
.hbrow-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hbrow-meta select{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--rs);color:var(--txt2);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:5px 8px;outline:none;cursor:pointer;}
.goal-input{display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:4px 8px;}
.goal-input span{font-size:11px;color:var(--txt3);font-weight:800;white-space:nowrap;}
.goal-input input{width:44px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--txt);outline:none;text-align:center;}
.rmv{background:none;border:1.5px solid var(--bdr);color:var(--txt3);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.rmv:hover{border-color:var(--acc);color:var(--acc);}
.addb{width:100%;padding:9px;border:2px dashed var(--bdr);border-radius:var(--rs);background:none;color:var(--txt3);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.addb.a1:hover{border-color:var(--p1);color:var(--p1);background:var(--p1l);}
.addb.a2:hover{border-color:var(--p2);color:var(--p2);background:var(--p2l);}
/* MAIN */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0 1rem;}
.tlogo{font-family:'Fredoka One',cursive;font-size:22px;color:var(--p2);}
.tlogo em{color:var(--p1);font-style:normal;}
.dpill{background:#fff;border:1.5px solid var(--bdr);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:800;color:var(--txt2);box-shadow:var(--sh);}
.dpill b{color:var(--acc);}
.liveb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3);font-weight:700;}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--p2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
/* ROOM BOX */
.rbox{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:.85rem 1rem;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:var(--sh);}
.rcode{font-family:'Fredoka One',cursive;font-size:24px;letter-spacing:4px;color:var(--p2);}
.rlbl{font-size:11px;color:var(--txt3);font-weight:700;width:100%;}
/* SCOREBOARD */
.scoreboard{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.1rem;margin-bottom:.75rem;position:relative;overflow:hidden;box-shadow:var(--sh2);}
.scoreboard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p1),var(--mintd),var(--p2));}
.sc-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);}
.sc-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:16px;flex-shrink:0;border:2.5px solid #fff;box-shadow:var(--sh);}
.sc-info{flex:1;min-width:0;}
.sc-name{font-weight:800;font-size:14px;}
.sc-sub{font-size:11px;color:var(--txt3);font-weight:700;}
.sc-right{text-align:right;}
.sc-streak{font-family:'Fredoka One',cursive;font-size:22px;}
.sc-streaksub{font-size:10px;color:var(--txt3);font-weight:700;}
.sc-divider{height:1px;background:var(--bdr);margin:2px 10px;}
.goalrow{margin-top:10px;padding-top:10px;border-top:1.5px dashed var(--bdr);display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--txt3);font-weight:700;}
.goalrow b{color:var(--txt2);}
/* PROGRESS BARS */
.btrk{height:10px;background:var(--s3);border-radius:99px;overflow:hidden;border:1.5px solid var(--bdr);}
.bfil{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.34,1.56,.64,1);}
.bf0{background:linear-gradient(90deg,#fde68a,var(--p1));}
.bf1{background:linear-gradient(90deg,var(--mint),var(--p2));}
.bf2{background:linear-gradient(90deg,#c4b5fd,#8b5cf6);}
.bf3{background:linear-gradient(90deg,#fdba74,#f97316);}
.bf4{background:linear-gradient(90deg,#93c5fd,#3b82f6);}
/* PLAYER AVATARS */
.av0{background:linear-gradient(135deg,#fde68a,var(--p1));color:#1a0a00;}
.av1{background:linear-gradient(135deg,var(--mint),var(--p2));color:#05201e;}
.av2{background:linear-gradient(135deg,#c4b5fd,#8b5cf6);color:#fff;}
.av3{background:linear-gradient(135deg,#fdba74,#f97316);color:#fff;}
.av4{background:linear-gradient(135deg,#93c5fd,#3b82f6);color:#fff;}
.sk0{color:var(--p1d);}
.sk1{color:var(--p2d);}
.sk2{color:#7c3aed;}
.sk3{color:#ea580c;}
.sk4{color:#2563eb;}
/* TAUNT */
.taunt{background:linear-gradient(135deg,#fffbeb,#fef9c3);border:1.5px solid #fcd34d;border-radius:var(--r);padding:.85rem 1rem;margin-bottom:.75rem;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);}
.taunt-ico{font-size:26px;flex-shrink:0;}
.taunt-txt{font-size:13px;font-weight:700;color:#92400e;line-height:1.45;}
/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.sec-title{font-family:'Fredoka One',cursive;font-size:17px;color:var(--txt);}
/* HABIT CARDS */
.hcard{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:all .25s;}
.hcard+.hcard{margin-top:.65rem;}
.hcard.dp0{border-color:var(--p1);background:var(--p1l);box-shadow:0 2px 12px #f59e0b20;}
.hcard.dp1{border-color:var(--p2);background:var(--p2l);box-shadow:0 2px 12px #10b98120;}
.hc-top{display:flex;align-items:center;gap:10px;padding:11px 13px;}
.hc-chk{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--bdr);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:16px;color:transparent;box-shadow:0 1px 4px #0001;}
.hc-chk:active{transform:scale(.9);}
.hc-chk.ck0{background:var(--p1);border-color:var(--p1d);color:#fff;box-shadow:0 2px 0 var(--p1d);}
.hc-chk.ck1{background:var(--p2);border-color:var(--p2d);color:#fff;box-shadow:0 2px 0 var(--p2d);}
.hc-chk.ck2{background:#8b5cf6;border-color:#7c3aed;color:#fff;}
.hc-chk.ck3{background:#f97316;border-color:#ea580c;color:#fff;}
.hc-chk.ck4{background:#3b82f6;border-color:#2563eb;color:#fff;}
.hc-info{flex:1;min-width:0;}
.hc-name{font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hc-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.hc-streak{font-size:11px;font-weight:700;color:var(--txt3);}
.hc-extra{background:#fff;border:1.5px solid var(--bdr);border-radius:8px;color:var(--txt3);font-size:11px;font-weight:800;padding:4px 8px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;white-space:nowrap;}
/* PUZZLE BLOCKS */
.puz-wrap{padding:0 13px 12px;}
.puz-lbl{font-size:10px;color:var(--txt3);font-weight:800;letter-spacing:.3px;margin-bottom:5px;display:flex;justify-content:space-between;}
.puz-grid{display:flex;flex-wrap:wrap;gap:3px;}
.puz-block{width:22px;height:17px;border-radius:4px;transition:all .3s;}
@keyframes bpop{0%{transform:scale(.2);}60%{transform:scale(1.3);}100%{transform:scale(1);}}
/* QUOTE */
.quote-strip{background:linear-gradient(135deg,var(--p2l),#f0fdf4);border-left:3px solid var(--p2);border-radius:0 var(--rs) var(--rs) 0;padding:7px 11px;margin:0 13px 10px;font-size:12px;font-weight:700;color:var(--p2d);font-style:italic;}
/* WEEKLY */
.week-card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:.75rem;box-shadow:var(--sh);}
.wk-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.wk-stat{background:var(--s2);border-radius:var(--rs);padding:.75rem;text-align:center;border:1.5px solid var(--bdr);}
.wk-stat-n{font-family:'Fredoka One',cursive;font-size:26px;}
.wk-stat-l{font-size:10px;color:var(--txt3);font-weight:700;margin-top:2px;}
.wk-bar{height:8px;background:var(--s3);border-radius:99px;overflow:hidden;border:1px solid var(--bdr);margin-top:4px;}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:.75rem;}
.hm-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:1.5px solid var(--bdr);}
.hm-none{background:var(--s2);color:var(--txt4);}
.hm-fut{background:var(--s3);color:var(--txt4);}
.hm-tod{outline:2px solid var(--acc);outline-offset:1px;}
/* PLAYERS TAB */
.ps-sec{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:.75rem;box-shadow:var(--sh);}
.ps-hdr{display:flex;align-items:center;gap:10px;margin-bottom:.85rem;padding-bottom:.75rem;border-bottom:1.5px solid var(--bdr);}
.ps-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.75rem;}
.ps-stat{background:var(--s2);border-radius:var(--rs);padding:.65rem;text-align:center;border:1.5px solid var(--bdr);}
.ps-stat-n{font-family:'Fredoka One',cursive;font-size:22px;}
.ps-stat-l{font-size:10px;color:var(--txt3);font-weight:700;}
.hpr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.hpr-nm{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hpr-trk{flex:2;height:8px;background:var(--s3);border-radius:99px;overflow:hidden;border:1px solid var(--bdr);}
.hpr-val{font-size:11px;font-weight:800;color:var(--txt2);white-space:nowrap;min-width:40px;text-align:right;}
/* CALENDAR */
.cal-sec{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:.75rem;box-shadow:var(--sh);}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:.85rem;}
.cal-title{font-family:'Fredoka One',cursive;font-size:17px;}
.calleg{display:flex;gap:8px;flex-wrap:wrap;}
.legit{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--txt2);font-weight:700;}
.legdot{width:11px;height:11px;border-radius:4px;flex-shrink:0;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dlbl{font-size:9px;font-weight:800;color:var(--txt4);text-align:center;padding-bottom:3px;}
.cday{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:1.5px solid transparent;}
.cday.cfut{background:var(--s3);color:var(--txt4);}
.cday.cemp{background:#fff;color:var(--txt3);border:1.5px dashed var(--bdr);}
.cday.cg0{background:var(--p1l);color:var(--p1d);border-color:var(--p1);}
.cday.cg1{background:var(--p2l);color:var(--p2d);border-color:var(--p2);}
.cday.cgb{background:linear-gradient(135deg,var(--p1l) 50%,var(--p2l) 50%);border-color:var(--mintd);}
.cday.cgp{background:#fce7f3;color:#be185d;border-color:#f9a8d4;opacity:.65;}
.cday.ctod{outline:2.5px solid var(--acc);outline-offset:2px;}
/* WINNER */
.winbanner{background:linear-gradient(135deg,#fffbeb,#f0fdf4);border:2px solid var(--p2);border-radius:var(--r);padding:1.5rem;text-align:center;margin-bottom:.75rem;box-shadow:var(--sh2);}
/* PUZZLE TAB */
.puz-tab-canvas-wrap{position:relative;border-radius:10px;overflow:hidden;border:2px solid var(--bdr);box-shadow:var(--sh2);margin:0 auto .75rem;}
/* EMOJI CONFETTI */
.econf{position:fixed;pointer-events:none;z-index:9998;animation:fall 3s ease-in forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
/* TOAST */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(100px);background:#fff;border:1.5px solid var(--bdr);border-radius:99px;padding:11px 22px;font-size:13px;font-weight:800;color:var(--txt);opacity:0;transition:all .35s;z-index:9998;white-space:nowrap;box-shadow:var(--sh2);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.resetlk{text-align:center;margin-top:.5rem;}
.resetlk button{background:none;border:none;color:var(--txt3);font-family:'Nunito',sans-serif;font-size:12px;cursor:pointer;font-weight:700;}
.resetlk button:hover{color:var(--acc);}
</style>
</head>
<body>
<canvas id="fw"></canvas>

<!-- LANDING -->
<div class="screen on" id="sLand">
  <div class="land maxw">
    <div class="biglogo">Habit<span>Duel</span></div>
    <div style="font-size:32px;margin-top:-6px;">🌿</div>
    <div class="tagline">Compete. Build habits. Win together.</div>
    <div class="card" style="margin-bottom:.75rem;">
      <div class="fredoka" style="font-size:18px;color:var(--p2);margin-bottom:.85rem;">🔗 Join a challenge</div>
      <input class="fi" id="joinCode" placeholder="Enter room code" maxlength="8" style="font-family:'Fredoka One',cursive;font-size:22px;letter-spacing:4px;text-align:center;text-transform:uppercase;margin-bottom:10px;"/>
      <button class="btn btn-primary" onclick="joinRoom()">Join Challenge</button>
    </div>
    <div class="divider">— or —</div>
    <button class="btn btn-amber" onclick="goSetup()">✨ Create New Challenge</button>
    <div id="rejoinBox" style="display:none;margin-top:.75rem;">
      <div class="divider">— or —</div>
      <button class="btn btn-ghost" id="rejoinBtn" onclick="rejoinLast()" style="width:100%;"></button>
    </div>
  </div>
</div>

<!-- SETUP -->
<div class="screen" id="sSetup">
  <div class="maxw">
    <div style="padding:.5rem 0 1.25rem;">
      <div class="setup-steps" id="setupDots"></div>

function listenRoom(code,cb){
  if(unsubFn){unsubFn();unsubFn=null;}

    const ref=db.ref('rooms/'+code);dbRef=ref;

function lsSave(c,d){try{localStorage.setItem(LS+c,JSON.stringify(d));}catch(e){}}

// ── UTILS ──────────────────────────────────────
function td(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addD(dt,n){const d=new Date(dt+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function since(dt){const s=new Date(dt+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.floor((n-s)/86400000);}
function inits(nm){return(nm||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function showS(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

// ── FIREWORKS ──────────────────────────────────
const cnv=document.getElementById('fw'),cx=cnv.getContext('2d');
let pts=[],fid=null;
function rsz(){cnv.width=innerWidth;cnv.height=innerHeight;}window.addEventListener('resize',rsz);rsz();
function boom(x,y,cols){for(let i=0;i<85;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*7;pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,col:cols[i%cols.length],sz:2+Math.random()*4,g:.1,dec:.012+Math.random()*.013});}if(!fid)floop();}
function floop(){cx.clearRect(0,0,cnv.width,cnv.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.alpha-=p.dec;p.vx*=.98;cx.globalAlpha=Math.max(0,p.alpha);cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;pts=pts.filter(p=>p.alpha>0);if(pts.length)fid=requestAnimationFrame(floop);else{fid=null;cx.clearRect(0,0,cnv.width,cnv.height);}}
function celebrate(pi){const pal=[['#fbbf24','#f59e0b','#fde68a','#fb923c','#fff'],['#34d399','#10b981','#6ee7b7','#a7f3d0','#fff'],['#a78bfa','#8b5cf6','#c4b5fd','#fff'],['#fb923c','#f97316','#fdba74','#fff'],['#60a5fa','#3b82f6','#93c5fd','#fff']];const c=pal[pi%pal.length];[{x:.25,y:.3},{x:.75,y:.3},{x:.5,y:.18},{x:.5,y:.55}].forEach((s,i)=>setTimeout(()=>boom(cnv.width*s.x,cnv.height*s.y,c),i*160));}
function emojiConf(pi){const sets=[['🌟','⭐','✨','🎉','🔥'],['🌿','💚','✨','🎊','⚡'],['💜','✨','🎊','🌸','⭐'],['🔶','✨','🎉','🔥','⭐'],['💙','✨','🎊','⭐','🌊']];const em=sets[pi%sets.length];for(let i=0;i<16;i++){const el=document.createElement('div');el.className='econf';el.textContent=em[Math.floor(Math.random()*em.length)];el.style.cssText='left:'+Math.random()*100+'vw;top:-30px;font-size:'+(14+Math.random()*14)+'px;animation-delay:'+Math.random()*1.2+'s;';document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}}

// ── AUDIO ──────────────────────────────────────
function playSound(type){try{const ac=new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);if(type==='check'){o.frequency.setValueAtTime(523,ac.currentTime);o.frequency.setValueAtTime(659,ac.currentTime+.1);o.frequency.setValueAtTime(784,ac.currentTime+.2);g.gain.setValueAtTime(.25,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.5);o.start(ac.currentTime);o.stop(ac.currentTime+.5);}else if(type==='win'){[523,659,784,1047].forEach((f,i)=>{const o2=ac.createOscillator(),g2=ac.createGain();o2.connect(g2);g2.connect(ac.destination);o2.frequency.value=f;g2.gain.setValueAtTime(.2,ac.currentTime+i*.12);g2.gain.exponentialRampToValueAtTime(.001,ac.currentTime+i*.12+.3);o2.start(ac.currentTime+i*.12);o2.stop(ac.currentTime+i*.12+.35);});}else if(type==='extra'){o.frequency.setValueAtTime(880,ac.currentTime);o.frequency.setValueAtTime(1100,ac.currentTime+.08);g.gain.setValueAtTime(.18,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.25);o.start(ac.currentTime);o.stop(ac.currentTime+.25);}}catch(e){}}

// ── SETUP STATE ────────────────────────────────
let setupData={challengeDays:30,overallGoal:21,players:[],currentStep:0};
function goSetup(){
  setupData={challengeDays:30,overallGoal:21,players:[{name:'',habits:[{name:'',category:'other',goal:21}]},{name:'',habits:[{name:'',category:'other',goal:21}]}],currentStep:0};
  renderSetupStep();showS('sSetup');
}
function renderSetupStep(){
  const step=setupData.currentStep;
  document.getElementById('setupDots').innerHTML=SETUP_STEPS.map((_,i)=>'<div class="step-dot '+(i<step?'done':i===step?'active':'')+'"></div>').join('');
  document.getElementById('setupBack').style.display=step>0?'flex':'none';
  document.getElementById('setupNext').textContent=step===3?'🚀 Start the Duel!':'Continue →';
  const titles=['⚙️ Challenge Settings','👥 Add Players','🌱 Set Habits','✅ Review & Launch'];
  const subs=['Set your challenge length and overall goal','Add yourself and your partner (or more!)','Add habits for each player with goals','Everything looks good? Let\'s go!'];
  document.getElementById('stepTitle').textContent=titles[step];
  document.getElementById('stepSub').textContent=subs[step];
  const body=document.getElementById('setupBody');
  if(step===0)renderStep0(body);
  else if(step===1)renderStep1(body);
  else if(step===2)renderStep2(body);
  else renderStep3(body);
}
function renderStep0(body){
  body.innerHTML='<div class="card"><div class="field"><span class="label">Challenge length (days)</span><input class="fi" id="s0days" type="number" min="7" max="365" value="'+setupData.challengeDays+'"/></div><div class="field"><span class="label">Overall goal (days to win)</span><input class="fi" id="s0goal" type="number" min="1" max="'+setupData.challengeDays+'" value="'+setupData.overallGoal+'"/><div style="font-size:12px;color:var(--txt3);margin-top:4px;font-weight:700;">First to reach this many days wins 🏆</div></div></div>';
}
function renderStep1(body){
  body.innerHTML='<div id="pList"></div><button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="addPlayer()">+ Add another player</button>';
  renderPList();
}
function renderPList(){
  const list=document.getElementById('pList');if(!list)return;
  list.innerHTML=setupData.players.map((p,i)=>'<div class="card" style="margin-bottom:8px;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;"><div class="sc-av av'+i%5+'" style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:\'Fredoka One\',cursive;font-size:13px;">'+(p.name?inits(p.name):'?')+'</div><div style="flex:1;font-family:\'Fredoka One\',cursive;font-size:15px;color:var(--txt2);">Player '+(i+1)+(i===0?' (You)':'')+'</div>'+(i>1?'<button class="btn" style="background:#fff1f2;border:1.5px solid #fecdd3;color:var(--acc);padding:6px 10px;font-size:12px;border-radius:var(--rs);" onclick="removePlayer('+i+')">✕</button>':'')+'</div><input class="fi amber" type="text" placeholder="Name" maxlength="18" value="'+esc(p.name)+'" oninput="setupData.players['+i+'].name=this.value;updateAv('+i+',this.value)"/></div>').join('');
}
function updateAv(i,name){const avs=document.querySelectorAll('#pList .sc-av');if(avs[i])avs[i].textContent=name?inits(name):'?';}
function addPlayer(){if(setupData.players.length>=5){toast('Max 5 players!');return;}setupData.players.push({name:'',habits:[{name:'',category:'other',goal:setupData.overallGoal}]});renderPList();}
function removePlayer(i){setupData.players.splice(i,1);renderPList();}
let activeHTab=0;
function renderStep2(body){
  // Save names from step1
  document.querySelectorAll('#pList input').forEach((inp,i)=>{if(setupData.players[i])setupData.players[i].name=inp.value.trim();});
  body.innerHTML='<div class="tabs" id="hTabs">'+setupData.players.map((p,i)=>'<div class="tab'+(i===0?' active':'')+'" onclick="switchHTab('+i+')">'+(p.name||'P'+(i+1))+'</div>').join('')+'</div><div id="hBody"></div>';
  activeHTab=0;renderHEditor(0);
}
function switchHTab(i){activeHTab=i;document.querySelectorAll('#hTabs .tab').forEach((t,j)=>t.classList.toggle('active',j===i));renderHEditor(i);}
function renderHEditor(pi){
  const p=setupData.players[pi];
  const body=document.getElementById('hBody');if(!body)return;
  body.innerHTML='<div id="hFor'+pi+'"></div><button class="addb a'+(pi===0?1:2)+'" onclick="addHabitTo('+pi+')">+ Add habit for '+esc(p.name||'Player '+(pi+1))+'</button>';
  renderHFor(pi);
}
function renderHFor(pi){
  const p=setupData.players[pi];const el=document.getElementById('hFor'+pi);if(!el)return;
  el.innerHTML=p.habits.map((h,hi)=>'<div class="hbrow"><div class="hbrow-top"><input type="text" placeholder="Habit e.g. Run 1km" maxlength="40" value="'+esc(h.name)+'" oninput="setupData.players['+pi+'].habits['+hi+'].name=this.value"/>'+(p.habits.length>1?'<button class="rmv" onclick="removeHabitFrom('+pi+','+hi+')">✕</button>':'')+'</div><div class="hbrow-meta"><select onchange="setupData.players['+pi+'].habits['+hi+'].category=this.value">'+Object.entries(CATS).map(([k,v])=>'<option value="'+k+'"'+(h.category===k?' selected':'')+'>'+v+'</option>').join('')+'</select><div class="goal-input"><span>Goal:</span><input type="number" min="1" max="'+setupData.challengeDays+'" value="'+h.goal+'" oninput="setupData.players['+pi+'].habits['+hi+'].goal=parseInt(this.value)||'+setupData.overallGoal+'"/><span>days</span></div></div></div>').join('');
}
function addHabitTo(pi){setupData.players[pi].habits.push({name:'',category:'other',goal:setupData.overallGoal});renderHEditor(pi);}
function removeHabitFrom(pi,hi){if(setupData.players[pi].habits.length<=1){toast('Need at least one habit!');return;}setupData.players[pi].habits.splice(hi,1);renderHEditor(pi);}
function renderStep3(body){
  var rows=setupData.players.map(function(p,i){
    var mt=i>0?'margin-top:12px;padding-top:12px;border-top:1.5px solid var(--bdr);':'';
    var habits=p.habits.map(function(h){return '<div style="font-size:12px;color:var(--txt2);font-weight:700;margin-top:2px;">'+(CAT_ICONS[h.category]||'⭐')+' '+esc(h.name||'Unnamed')+' <span style="color:var(--txt3);">· '+h.goal+'d goal</span></div>';}).join('');
    return '<div style="display:flex;align-items:flex-start;gap:10px;'+mt+'"><div class="sc-av av'+(i%5)+'" style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:\'Fredoka One\',cursive;font-size:13px;flex-shrink:0;">'+inits(p.name||'P'+(i+1))+'</div><div><div style="font-weight:800;font-size:14px;">'+esc(p.name||'Player '+(i+1))+'</div>'+habits+'</div></div>';
  }).join('');
  body.innerHTML='<div class="card"><div style="margin-bottom:.85rem;padding-bottom:.75rem;border-bottom:1.5px solid var(--bdr);"><div style="font-weight:800;font-size:15px;">⚙️ Challenge: '+setupData.challengeDays+' days</div><div style="font-size:12px;color:var(--txt3);font-weight:700;">Win at '+setupData.overallGoal+'+ days completed</div></div>'+rows+'</div>';
}
function setupPrev(){if(setupData.currentStep>0){setupData.currentStep--;renderSetupStep();}}
function setupNext(){
  const step=setupData.currentStep;
  if(step===0){
    const days=parseInt(document.getElementById('s0days').value)||30;
    const goal=parseInt(document.getElementById('s0goal').value)||21;
    if(days<7){toast('Minimum 7 days!');return;}
    if(goal>days){toast('Goal can\'t exceed challenge length!');return;}
    setupData.challengeDays=days;setupData.overallGoal=goal;
  } else if(step===1){
    const inputs=document.querySelectorAll('#pList input');
    let ok=true;
    inputs.forEach((inp,i)=>{const v=inp.value.trim();if(!v){toast('All players need names!');ok=false;return;}if(setupData.players[i])setupData.players[i].name=v;});
    if(!ok)return;
    if(setupData.players.length<2){toast('Need at least 2 players!');return;}
  } else if(step===2){
    for(const p of setupData.players){for(const h of p.habits){if(!h.name.trim()){toast('All habits need names!');return;}}}
  } else if(step===3){
    createChallenge();return;
  }
  setupData.currentStep++;renderSetupStep();
}

// ── CREATE / JOIN ──────────────────────────────
function createChallenge(){
  const code=genCode();
  state={code,startDate:td(),challengeDays:setupData.challengeDays,overallGoal:setupData.overallGoal,
    players:setupData.players.map(p=>({name:p.name,habits:p.habits.map(h=>({name:h.name,category:h.category||'other',goal:h.goal||setupData.overallGoal,logs:{},extra:{}}))}))};
  showS('sLoad');
  if(hasDB)dbRef=db.ref('rooms/'+code);
  pushState();
  setTimeout(()=>{listenRoom(code,d=>{state=d;renderMain();});showS('sMain');activeTab=0;renderMain();toast('🎉 Duel started! Code: '+code);},700);
}
function joinRoom(){
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(code.length<4){toast('Enter a valid room code!');return;}
  showS('sLoad');
  if(hasDB){
    db.ref('rooms/'+code).get().then(snap=>{const v=snap.val();if(v)go(code,v);else{const ls=lsLoad(code);if(ls)go(code,ls);else{toast('Room not found!');showS('sLand');}}}).catch(()=>{const ls=lsLoad(code);if(ls)go(code,ls);else{toast('Connection error!');showS('sLand');}});
  } else {const ls=lsLoad(code);if(ls)go(code,ls);else{toast('Room not found — check Firebase config!');showS('sLand');}}
}
function go(code,data){state=data;if(hasDB)dbRef=db.ref('rooms/'+code);listenRoom(code,d=>{state=d;renderMain();});showS('sMain');activeTab=0;renderMain();}

// ── TOGGLE ─────────────────────────────────────
function toggleHabit(pi,hi){
  const p=state.players[pi],h=p.habits[hi],t=td();
  const wasAll=allDone(pi);
  if(h.logs&&h.logs[t]){delete h.logs[t];if(h.extra)delete h.extra[t];}
  else{
    if(!h.logs)h.logs={};if(!h.extra)h.extra={};
    h.logs[t]=true;h.extra[t]=1;
    playSound('check');
    setTimeout(()=>{
      celebrate(pi);emojiConf(pi);toast(rnd(QUOTES));
      if(allDone(pi)&&!wasAll){playSound('win');setTimeout(()=>{celebrate(pi);toast('🎉 '+p.name+' crushed ALL habits today!');},500);}
    },100);
  }
  pushState();renderMain();
}
function logExtra(pi,hi){
  const p=state.players[pi],h=p.habits[hi],t=td();
  if(!h.logs)h.logs={};if(!h.extra)h.extra={};
  h.logs[t]=true;h.extra[t]=(h.extra[t]||1)+1;
  playSound('extra');celebrate(pi);toast('💪 +1 extra for '+p.name+'!');
  pushState();renderMain();
}
function allDone(pi){const t=td();return state.players[pi].habits.every(h=>h.logs&&h.logs[t]);}

// ── CALCS ──────────────────────────────────────
function pStreak(pi){let s=0,d=td();while(state.players[pi].habits.some(h=>h.logs&&h.logs[d])){s++;d=addD(d,-1);}return s;}
function hStreak(h){let s=0,d=td();while(h.logs&&h.logs[d]){s++;d=addD(d,-1);}return s;}
function hDone(h){if(!h.logs||!state)return 0;const start=new Date(state.startDate+'T00:00:00');return Object.keys(h.logs).filter(d=>{const dx=new Date(d+'T00:00:00');return dx>=start&&dx<=new Date();}).length;}
function pDaysDone(pi){
  if(!state)return 0;const p=state.players[pi];
  const all=new Set();p.habits.forEach(h=>{if(h.logs)Object.keys(h.logs).forEach(d=>all.add(d));});
  const start=new Date(state.startDate+'T00:00:00');
  return[...all].filter(d=>{const dx=new Date(d+'T00:00:00');return dx>=start&&dx<=new Date()&&p.habits.every(h=>h.logs&&h.logs[d]);}).length;
}
function pPartialDays(pi){
  if(!state)return 0;const p=state.players[pi];
  const all=new Set();p.habits.forEach(h=>{if(h.logs)Object.keys(h.logs).forEach(d=>all.add(d));});
  const start=new Date(state.startDate+'T00:00:00');
  return[...all].filter(d=>{const dx=new Date(d+'T00:00:00');return dx>=start&&dx<=new Date();}).length;
}

function renderTaunt(){

  // Find the leader (most days done)
  const scores=state.players.map((_,i)=>({i,d:pDaysDone(i),s:pStreak(i)}));
  scores.sort((a,b)=>b.d-a.d||b.s-a.s);
  const leader=scores[0],second=scores[1];
  if(leader.d<=second.d+1&&leader.s<=second.s+1){sec.style.display='none';return;}

function renderPuzBlocks(pi,hi,h,hGoal){

// ── PUZZLE TAB ─────────────────────────────────
function seededRng(seed){let s=0;for(let i=0;i<seed.length;i++)s=(s*31+seed.charCodeAt(i))>>>0;return function(){s=(s*1664525+1013904223)>>>0;return s/4294967296;};}
const artCache={};
function getArt(seed,w,h){
  w=Math.max(w,40);h=Math.max(h,40);
  // Round to nearest 10 to avoid too many cache entries
  const rw=Math.round(w/10)*10, rh=Math.round(h/10)*10;
  const key=seed+'|'+rw+'|'+rh;
  if(artCache[key])return artCache[key];
  const rng=seededRng(seed);
  const themes=[drawSunset,drawGalaxy,drawForest,drawOcean,drawMandala,drawMountains];
  const idx=Math.floor(rng()*themes.length);
  const c=document.createElement('canvas');c.width=rw;c.height=rh;
  const ctx=c.getContext('2d');
  try{themes[idx](ctx,rw,rh,seededRng(seed+'x'));}
  catch(e){const g=ctx.createLinearGradient(0,0,rw,rh);g.addColorStop(0,'#6ee7b7');g.addColorStop(1,'#3b82f6');ctx.fillStyle=g;ctx.fillRect(0,0,rw,rh);}
  artCache[key]=c;return c;
}
function drawSunset(ctx,w,h,rng){var g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'hsl('+(200+rng()*40)+',80%,'+(40+rng()*20)+'%)');g.addColorStop(0.4,'hsl('+(20+rng()*30)+',90%,'+(55+rng()*15)+'%)');g.addColorStop(1,'hsl('+(350+rng()*20)+',70%,'+(30+rng()*15)+'%)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.beginPath();ctx.arc(w*(0.3+rng()*0.4),h*(0.25+rng()*0.2),Math.max(4,w*0.1),0,Math.PI*2);ctx.fillStyle='hsl(45,100%,'+(70+rng()*20)+'%)';ctx.fill();for(var i=0;i<4;i++){var r=Math.max(2,w*(0.05+rng()*0.07));ctx.beginPath();ctx.arc(w*rng(),h*(0.08+rng()*0.2),r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fill();}ctx.beginPath();ctx.moveTo(0,h);for(var i=0;i<=8;i++)ctx.lineTo(w*i/8,h*(0.5+Math.sin(i*2.3+rng()*3)*0.18));ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle='hsl('+(220+rng()*30)+',40%,'+(25+rng()*15)+'%)';ctx.fill();}
function drawGalaxy(ctx,w,h,rng){ctx.fillStyle='#050520';ctx.fillRect(0,0,w,h);for(var i=0;i<150;i++){var r=Math.max(0.5,rng()*1.8);ctx.beginPath();ctx.arc(w*rng(),h*rng(),r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(0.4+rng()*0.6)+')';ctx.fill();}ctx.beginPath();ctx.arc(w*(0.3+rng()*0.4),h*(0.25+rng()*0.3),Math.max(4,w*0.07),0,Math.PI*2);ctx.fillStyle='hsl('+(rng()*360)+',70%,65%)';ctx.fill();}
function drawForest(ctx,w,h,rng){var g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'hsl('+(190+rng()*30)+',60%,'+(55+rng()*20)+'%)');g.addColorStop(1,'hsl('+(100+rng()*30)+',50%,'+(20+rng()*15)+'%)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);for(var i=0;i<7;i++){var tx=w*(i/6+(rng()-0.5)*0.05),th=Math.max(10,h*(0.35+rng()*0.3)),tw=Math.max(4,w*0.05);ctx.fillStyle='hsl('+(100+rng()*40)+','+(50+rng()*30)+'%,'+(20+rng()*20)+'%)';ctx.beginPath();ctx.moveTo(tx,h*0.9-th);ctx.lineTo(tx-tw,h*0.9);ctx.lineTo(tx+tw,h*0.9);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(tx,h*0.9-th*1.3);ctx.lineTo(tx-tw*0.8,h*0.9-th*0.5);ctx.lineTo(tx+tw*0.8,h*0.9-th*0.5);ctx.closePath();ctx.fill();}ctx.fillStyle='hsl('+(30+rng()*20)+',50%,'+(25+rng()*10)+'%)';ctx.fillRect(0,h*0.88,w,h*0.12);}
function drawOcean(ctx,w,h,rng){var g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'hsl('+(200+rng()*20)+',70%,'+(60+rng()*15)+'%)');g.addColorStop(1,'hsl('+(210+rng()*20)+',80%,'+(25+rng()*15)+'%)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);for(var i=0;i<6;i++){ctx.beginPath();ctx.moveTo(0,h*(0.4+i*0.08));for(var x=0;x<=w;x+=8)ctx.lineTo(x,h*(0.4+i*0.08)+Math.sin(x*0.04+i*1.5)*h*0.015);ctx.strokeStyle='rgba(255,255,255,'+(0.1+rng()*0.12)+')';ctx.lineWidth=1.5;ctx.stroke();}for(var i=0;i<3;i++){var r=Math.max(3,w*(0.04+rng()*0.06));ctx.beginPath();ctx.arc(w*(0.1+rng()*0.8),h*(0.05+rng()*0.15),r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill();}}
function drawMandala(ctx,w,h,rng){ctx.fillStyle='hsl('+(270+rng()*60)+',30%,'+(12+rng()*8)+'%)';ctx.fillRect(0,0,w,h);var cx2=w/2,cy2=h/2,layers=4+Math.floor(rng()*4);for(var l=0;l<layers;l++){var rad=Math.max(3,Math.min(w,h)*(0.06+l*0.07)),petals=6+l*2,hue=rng()*360;for(var p=0;p<petals;p++){var angle=(p/petals)*Math.PI*2,pr=Math.max(2,Math.min(w,h)*(0.02+rng()*0.025));ctx.beginPath();ctx.arc(cx2+Math.cos(angle)*rad,cy2+Math.sin(angle)*rad,pr,0,Math.PI*2);ctx.fillStyle='hsla('+(hue+p*20)+',70%,'+(50+rng()*30)+'%,0.85)';ctx.fill();}}ctx.beginPath();ctx.arc(cx2,cy2,Math.max(3,Math.min(w,h)*0.05),0,Math.PI*2);ctx.fillStyle='hsl('+(rng()*360)+',80%,70%)';ctx.fill();}
function drawMountains(ctx,w,h,rng){var g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'hsl('+(210+rng()*30)+',60%,'+(60+rng()*20)+'%)');g.addColorStop(1,'hsl('+(220+rng()*20)+',40%,'+(30+rng()*15)+'%)');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);var pts2=[];for(var i=0;i<9;i++)pts2.push({x:w*i/8,y:h*(0.3+rng()*0.25)});ctx.beginPath();ctx.moveTo(0,h);pts2.forEach(function(p){ctx.lineTo(p.x,p.y);});ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle='hsl('+(220+rng()*20)+',30%,'+(40+rng()*10)+'%)';ctx.fill();pts2.slice(1,-1).forEach(function(p){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-Math.max(3,w*0.025),p.y+h*0.05);ctx.lineTo(p.x+Math.max(3,w*0.025),p.y+h*0.05);ctx.closePath();ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fill();});ctx.beginPath();ctx.moveTo(0,h);for(var i=0;i<=10;i++)ctx.lineTo(w*i/10,h*(0.58+rng()*0.18));ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle='hsl('+(150+rng()*30)+',30%,'+(20+rng()*10)+'%)';ctx.fill();}

function renderPuzzleTab(){
  const el=document.getElementById('puzzleContent');if(!el)return;
  el.innerHTML='<div style="text-align:center;padding:2rem;color:var(--txt3);font-weight:700;">🧩 Loading painting...</div>';
  setTimeout(()=>buildPuzzleTab(el),150);
}
function buildPuzzleTab(el){
  el.innerHTML='';
  const maxW=Math.max(280,(document.querySelector('.maxw')?.clientWidth||360)-24);
  const seed=state.code||'duel';
  const total=state.challengeDays;
  const dpr=Math.min(window.devicePixelRatio||1,3); // High-DPI support

  // Count full-habit days per player (supports N players)
  const pDoneArr=state.players.map(()=>0);
  for(let i=0;i<total;i++){
    const d=addD(state.startDate,i);
    if(new Date(d+'T00:00:00')>new Date())break;
    state.players.forEach((p,pi)=>{if(p.habits.every(h=>h.logs&&h.logs[d]))pDoneArr[pi]++;});
  }
  const p0done=pDoneArr[0]||0,p1done=pDoneArr[1]||0;

  // Fixed large canvas — full width, 4:3 aspect ratio like a real painting
  const W=maxW;
  const H=Math.round(W*0.75);
  // Divide canvas into total pieces — square-ish
  const cols=Math.max(1,Math.round(Math.sqrt(total*(W/H))));
  const rows=Math.max(1,Math.ceil(total/cols));
  const pw=Math.floor(W/cols);
  const ph=Math.floor(H/rows);
  // Snap canvas to exact grid size
  const CW=cols*pw, CH=rows*ph;

  // Shuffled order - seeded so both players see same layout
  const rng=seededRng(seed+'ord');
  const order=Array.from({length:total},(_,i)=>i).sort(()=>rng()-0.5);
  // Split pieces equally among all players
  const n=state.players.length;
  const shareSize=Math.ceil(total/n);
  const pOrders=state.players.map((_,pi)=>order.slice(pi*shareSize,Math.min((pi+1)*shareSize,total)));
  const half=shareSize; // kept for completion check compat
  const p0order=pOrders[0]||[];
  const p1order=pOrders[1]||[];

  // Generate art at HIGH resolution (dpr * display size)
  const art=getArt(seed, CW*dpr, CH*dpr);

  // Stats card
  // pct and player names now computed in stats card block below
  const statsCard=document.createElement('div');statsCard.className='card';statsCard.style.marginBottom='.75rem';
  const totalRevealed=pDoneArr.reduce((s,v)=>s+v,0);
  const pct=Math.round(totalRevealed/(total*state.players.length)*100);
  const bgCols=['var(--p1l)','var(--p2l)','#ede9fe','#fff7ed','#eff6ff'];
  const bdCols=['var(--p1)','var(--p2)','#8b5cf6','#f97316','#3b82f6'];
  const txCols=['var(--p1d)','var(--p2d)','#7c3aed','#ea580c','#2563eb'];
  const playerShareSize=Math.ceil(total/state.players.length);
  const playerGrid=state.players.map((p,pi)=>'<div style="background:'+bgCols[pi%5]+';border:1.5px solid '+bdCols[pi%5]+';border-radius:var(--rs);padding:10px;text-align:center;"><div style="font-size:12px;font-weight:800;color:'+txCols[pi%5]+';">'+esc(p.name)+'</div><div style="font-family:\'Fredoka One\',cursive;font-size:22px;color:'+txCols[pi%5]+';">'+pDoneArr[pi]+'/'+Math.ceil(total/state.players.length)+'</div><div style="font-size:10px;color:'+txCols[pi%5]+';font-weight:700;">pieces</div></div>').join('');
  statsCard.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><div style="font-family:\'Fredoka One\',cursive;font-size:17px;">🧩 The Duel Painting</div><div style="font-size:12px;font-weight:800;color:var(--txt3);">'+pct+'% revealed</div></div><div style="font-size:11px;color:var(--txt3);font-weight:700;margin-bottom:10px;">Each player reveals their share — complete ALL habits daily to uncover yours</div><div style="display:grid;grid-template-columns:repeat('+Math.min(state.players.length,3)+',1fr);gap:8px;">'+playerGrid+'</div>';
  el.appendChild(statsCard);

  // Canvas wrapper — CSS size = W x H, internal = W*dpr x H*dpr
  const wrap=document.createElement('div');
  wrap.style.cssText='position:relative;width:'+CW+'px;height:'+CH+'px;border-radius:12px;overflow:hidden;border:2px solid var(--bdr);box-shadow:var(--sh2);margin:0 auto .75rem;';

  // BG canvas (high-res)
  const bgC=document.createElement('canvas');
  bgC.width=CW*dpr;bgC.height=CH*dpr;
  bgC.style.cssText='position:absolute;top:0;left:0;width:'+CW+'px;height:'+CH+'px;';
  const bgX=bgC.getContext('2d');bgX.scale(dpr,dpr);
  bgX.fillStyle='#dde8f4';bgX.fillRect(0,0,CW,CH);
  // Grid lines
  bgX.strokeStyle='#c5d5e8';bgX.lineWidth=0.5;
  for(let ci=1;ci<cols;ci++){bgX.beginPath();bgX.moveTo(ci*pw,0);bgX.lineTo(ci*pw,CH);bgX.stroke();}
  for(let ri=1;ri<rows;ri++){bgX.beginPath();bgX.moveTo(0,ri*ph);bgX.lineTo(CW,ri*ph);bgX.stroke();}
  // Subtle ownership tints — one color per player
  const tintCols=['rgba(249,200,70,0.12)','rgba(16,185,129,0.12)','rgba(139,92,246,0.12)','rgba(249,115,22,0.12)','rgba(59,130,246,0.12)'];
  pOrders.forEach((pord,pi)=>{pord.forEach(idx=>{const r=Math.floor(idx/cols),cc=idx%cols;bgX.fillStyle=tintCols[pi%tintCols.length];bgX.fillRect(cc*pw,r*ph,pw,ph);});});
  const totalRevealed2=pDoneArr.reduce((s,v)=>s+v,0);
  if(totalRevealed2===0){
    bgX.font='bold '+Math.floor(Math.min(CW,CH)*0.22)+'px Nunito';
    bgX.fillStyle='#94a3b8';bgX.textAlign='center';bgX.textBaseline='middle';
    bgX.fillText('?',CW/2,CH/2);
  }
  wrap.appendChild(bgC);

  // Revealed canvas (high-res)
  const revC=document.createElement('canvas');
  revC.width=CW*dpr;revC.height=CH*dpr;
  revC.style.cssText='position:absolute;top:0;left:0;width:'+CW+'px;height:'+CH+'px;';
  const revX=revC.getContext('2d');
  function drawPieces(porder,pcount){
    for(let i=0;i<Math.min(pcount,porder.length);i++){
      const idx=porder[i],r=Math.floor(idx/cols),cc=idx%cols;
      const sx=cc*pw*dpr, sy=r*ph*dpr, sw=pw*dpr, sh=ph*dpr;
      if(sx+sw<=CW*dpr&&sy+sh<=CH*dpr){
        revX.drawImage(art,sx,sy,sw,sh,sx,sy,sw,sh);
        revX.strokeStyle='rgba(255,255,255,0.3)';revX.lineWidth=1*dpr;
        revX.strokeRect(sx+0.5*dpr,sy+0.5*dpr,sw-dpr,sh-dpr);
      }
    }
  }
  pOrders.forEach((pord,pi)=>drawPieces(pord,pDoneArr[pi]||0));

  // Trophy overlay when all players have revealed their shares
  const allComplete=pOrders.every((pord,pi)=>(pDoneArr[pi]||0)>=pord.length);
  if(allComplete&&total>0){
    const ov=document.createElement('div');
    ov.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);';
    ov.innerHTML='<div style="font-size:52px;filter:drop-shadow(0 2px 12px rgba(0,0,0,0.5));">🏆</div>';
    wrap.appendChild(ov);
  }
  wrap.appendChild(revC);
  el.appendChild(wrap);

  // ── REWARD GALLERY ────────────────────────────
  // One reward painting per player: goal unlock + 30-day bonus unlock
  state.players.forEach((p,pi)=>{
    const pDone=pDoneArr[pi]||0;
    const goal=state.overallGoal;
    const fullDays=state.challengeDays;
    const goalUnlocked=pDone>=goal;
    const bonusUnlocked=pDone>=fullDays;

    const rewardCard=document.createElement('div');
    rewardCard.className='card';rewardCard.style.marginBottom='.75rem';

    const avColor=['var(--p1l)','var(--p2l)','#ede9fe','#fff7ed','#eff6ff'][pi%5];
    const avBorder=['var(--p1)','var(--p2)','#8b5cf6','#f97316','#3b82f6'][pi%5];
    const nameColor=['var(--p1d)','var(--p2d)','#7c3aed','#ea580c','#2563eb'][pi%5];

    rewardCard.innerHTML=
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1.5px solid var(--bdr);">'
      +'<div class="sc-av av'+pi%5+'" style="width:36px;height:36px;font-size:14px;">'+inits(p.name)+'</div>'
      +'<div><div style="font-family:\'Fredoka One\',cursive;font-size:16px;">'+esc(p.name)+'\'s Rewards</div>'
      +'<div style="font-size:11px;color:var(--txt3);font-weight:700;">'+pDone+' full days completed</div></div>'
      +'</div>'
      +'<div id="rewards_'+pi+'"></div>';
    el.appendChild(rewardCard);

    const rewardsEl=rewardCard.querySelector('#rewards_'+pi);

    // ── GOAL REWARD ──
    buildRewardPainting(rewardsEl,{
      seed: state.code+'_reward_p'+pi+'_goal',
      label: '🎯 Goal Reward',
      sublabel: 'Complete '+goal+' days to unlock',
      unlocked: goalUnlocked,
      dpr,
      maxW: maxW,
      badge: goalUnlocked?'✨ Unlocked — '+goal+' days achieved!':'🔒 '+Math.max(0,goal-pDone)+' more days to unlock',
      badgeColor: goalUnlocked?'var(--p2)':'var(--txt3)',
    });

    // ── BONUS REWARD ──
    const bonusSection=document.createElement('div');bonusSection.style.marginTop='1rem';
    rewardsEl.appendChild(bonusSection);
    buildRewardPainting(bonusSection,{
      seed: state.code+'_reward_p'+pi+'_bonus',
      label: '⭐ Bonus Reward',
      sublabel: 'Complete ALL '+fullDays+' days to unlock',
      unlocked: bonusUnlocked,
      dpr,
      maxW: maxW,
      badge: bonusUnlocked?'🏆 Perfect run — all '+fullDays+' days done!':'🔒 '+Math.max(0,fullDays-pDone)+' more days to unlock',
      badgeColor: bonusUnlocked?'var(--p1)':'var(--txt3)',
    });
  });
}

function buildRewardPainting(container,{seed,label,sublabel,unlocked,dpr,maxW,badge,badgeColor}){
  const RW=maxW;
  const RH=Math.round(RW*0.65); // wide landscape painting

  // Label row
  const lbl=document.createElement('div');
  lbl.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;';
  lbl.innerHTML='<div style="font-weight:800;font-size:13px;">'+label+'</div>'
    +'<div style="font-size:11px;font-weight:800;color:'+badgeColor+';">'+badge+'</div>';
  container.appendChild(lbl);

  // Canvas wrap
  const wrap=document.createElement('div');
  wrap.style.cssText='position:relative;width:'+RW+'px;height:'+RH+'px;border-radius:10px;overflow:hidden;border:2px solid var(--bdr);box-shadow:var(--sh);';

  if(unlocked){
    // Generate and show the full painting
    const art=getArt(seed,RW*dpr,RH*dpr);
    const c=document.createElement('canvas');
    c.width=RW*dpr;c.height=RH*dpr;
    c.style.cssText='width:'+RW+'px;height:'+RH+'px;display:block;';
    const ctx=c.getContext('2d');
    ctx.drawImage(art,0,0,RW*dpr,RH*dpr,0,0,RW*dpr,RH*dpr);
    wrap.appendChild(c);
    // Shimmer overlay
    const shine=document.createElement('div');
    shine.style.cssText='position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 50%,rgba(255,255,255,0.08) 100%);pointer-events:none;';
    wrap.appendChild(shine);
  } else {
    // Locked — show blurred/dark placeholder
    const art=getArt(seed,RW*dpr,RH*dpr);
    const c=document.createElement('canvas');
    c.width=RW*dpr;c.height=RH*dpr;
    c.style.cssText='width:'+RW+'px;height:'+RH+'px;display:block;filter:blur(12px) brightness(0.35);';
    const ctx=c.getContext('2d');
    ctx.drawImage(art,0,0,RW*dpr,RH*dpr,0,0,RW*dpr,RH*dpr);
    wrap.appendChild(c);
    // Lock overlay
    const lock=document.createElement('div');
    lock.style.cssText='position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;';
    lock.innerHTML='<div style="font-size:36px;">🔒</div>'
      +'<div style="font-size:12px;font-weight:800;color:rgba(255,255,255,0.7);">'+sublabel+'</div>';
    wrap.appendChild(lock);
  }
  container.appendChild(wrap);
}

// ── NAVIGATION ─────────────────────────────────
function copyCode(){const c=state?.code||'';navigator.clipboard.writeText(c).then(()=>toast('📋 Code copied!')).catch(()=>toast('Code: '+c));}
// ── CONFIRM MODAL ──────────────────────────────
function showConfirm(msg, onYes){
  const existing=document.getElementById('confirmModal');
  if(existing)existing.remove();
  const modal=document.createElement('div');
  modal.id='confirmModal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:99999;display:flex;align-items:center;justify-content:center;padding:1.5rem;';
  modal.innerHTML='<div style="background:#fff;border-radius:var(--r);padding:1.5rem;max-width:320px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.25);">'
    +'<div style="font-weight:800;font-size:15px;color:var(--txt);margin-bottom:.75rem;line-height:1.5;">'+msg+'</div>'
    +'<div style="display:flex;gap:8px;">'
    +'<button onclick="document.getElementById(\'confirmModal\').remove()" style="flex:1;padding:11px;border:1.5px solid var(--bdr);background:#fff;border-radius:var(--rs);font-family:\'Nunito\',sans-serif;font-size:14px;font-weight:800;color:var(--txt2);cursor:pointer;">Cancel</button>'
    +'<button id="confirmYes" style="flex:1;padding:11px;border:none;background:var(--acc);border-radius:var(--rs);font-family:\'Nunito\',sans-serif;font-size:14px;font-weight:800;color:#fff;cursor:pointer;">Yes, confirm</button>'
    +'</div></div>';
  document.body.appendChild(modal);
  document.getElementById('confirmYes').onclick=()=>{modal.remove();onYes();};
}

function leaveDuel(){
  showConfirm('Leave this duel? Your progress stays saved — rejoin anytime with the room code. 👋', ()=>{
    if(unsubFn){unsubFn();unsubFn=null;}
    if(state)localStorage.removeItem(LS+state.code);
    state=null;dbRef=null;lastSnap='';activeTab=0;
    document.getElementById('joinCode').value='';
    document.querySelectorAll('.bnav-item').forEach((el,j)=>el.classList.toggle('active',j===0));
    ['tabHome','tabPuzzle','tabPlayers','tabWeekly','tabCalendar'].forEach((id,j)=>document.getElementById(id).style.display=j===0?'block':'none');
    showS('sLand');toast('👋 Left the duel — rejoin anytime!');
  });
}
function resetAll(){
  showConfirm('⚠️ Delete ALL progress permanently for everyone? This cannot be undone.', ()=>{
    if(hasDB&&dbRef)dbRef.remove().catch(()=>{});
    if(state)localStorage.removeItem(LS+state.code);
    if(unsubFn){unsubFn();unsubFn=null;}
    state=null;dbRef=null;lastSnap='';activeTab=0;
    document.getElementById('joinCode').value='';
    showS('sLand');
  });
}
let lastSavedCode=null;
function rejoinLast(){
  if(!lastSavedCode)return;
  const data=lsLoad(lastSavedCode);
  if(data)go(lastSavedCode,data);
  else{showS('sLoad');if(hasDB){db.ref('rooms/'+lastSavedCode).get().then(snap=>{const v=snap.val();if(v)go(lastSavedCode,v);else{toast('Room not found!');showS('sLand');}}).catch(()=>{toast('Error!');showS('sLand');});}else{toast('Not found!');showS('sLand');}}
}

// ── INIT ───────────────────────────────────────
(function(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith(LS)&&k.length>LS.length);
  if(keys.length){
    try{
      const code=keys[keys.length-1].replace(LS,'');
      const data=JSON.parse(localStorage.getItem(keys[keys.length-1]));
      if(data&&data.code&&data.players&&data.players.length>=2){
        lastSavedCode=code;
        const box=document.getElementById('rejoinBox'),btn=document.getElementById('rejoinBtn');
        if(box&&btn){btn.textContent='↩️ Rejoin: '+data.players.map(p=>p.name).join(' vs ')+' ('+code+')';box.style.display='block';}
      }
    }catch(e){}
  }
})();
</script>
