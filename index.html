<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>HabitDuel 🌿</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0fdf6;--bg2:#e8faf2;
  --s1:#ffffff;--s2:#f5fdf9;--s3:#edfbf4;
  --p1:#f59e0b;--p1d:#d97706;--p1l:#fef3c7;--p1ll:#fffbeb;
  --p2:#10b981;--p2d:#059669;--p2l:#d1fae5;--p2ll:#f0fdf4;
  --acc:#f43f5e;--accd:#be123c;
  --mint:#6ee7b7;--mintd:#34d399;
  --purple:#8b5cf6;--purpled:#7c3aed;--purplel:#ede9fe;
  --blue:#3b82f6;--bluel:#eff6ff;
  --orange:#f97316;--orangel:#fff7ed;
  --txt:#1a3a2a;--txt2:#4a7a5a;--txt3:#8abf9a;--txt4:#b8d4c0;
  --bdr:#c6f0da;--bdr2:#a7e8c8;
  --r:16px;--rs:10px;--rxs:6px;
  --sh:0 2px 12px #10b98115;--sh2:0 4px 24px #10b98122;
}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:'Nunito',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;top:-100px;right:-100px;width:350px;height:350px;background:radial-gradient(circle,#bbf7d060 0%,transparent 70%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;bottom:-80px;left:-80px;width:280px;height:280px;background:radial-gradient(circle,#fef9c360 0%,transparent 70%);pointer-events:none;z-index:0;}
#fw{position:fixed;inset:0;pointer-events:none;z-index:9999;}
.screen{position:relative;z-index:1;display:none;min-height:100vh;padding:1.25rem 1rem 5rem;}
.screen.on{display:block;}
.maxw{max-width:500px;margin:0 auto;}

/* ── TYPOGRAPHY ── */
.fredoka{font-family:'Fredoka One',cursive;}

/* ── CARDS ── */
.card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;box-shadow:var(--sh);}
.card+.card{margin-top:.75rem;}

/* ── BUTTONS ── */
.btn{border:none;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;transition:transform .15s,box-shadow .15s;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--p2);color:#fff;padding:14px 20px;font-size:16px;width:100%;border-radius:var(--r);box-shadow:0 4px 0 var(--p2d);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--p2d);}
.btn-amber{background:var(--p1);color:#fff;padding:14px 20px;font-size:16px;width:100%;border-radius:var(--r);box-shadow:0 4px 0 var(--p1d);}
.btn-amber:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--p1d);}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:var(--rs);}
.btn-ghost{background:transparent;border:1.5px solid var(--bdr);color:var(--txt2);padding:8px 14px;font-size:13px;border-radius:var(--rs);}
.btn-ghost:hover{background:var(--s3);border-color:var(--bdr2);}
.btn-danger{background:#fff1f2;border:1.5px solid #fecdd3;color:var(--acc);padding:7px 13px;font-size:12px;border-radius:var(--rs);}
.btn-danger:hover{background:#ffe4e6;}

/* ── INPUTS ── */
.fi{width:100%;background:var(--s2);border:1.5px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-family:'Nunito',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border .2s,box-shadow .2s;}
.fi:focus{border-color:var(--p2);box-shadow:0 0 0 3px #6ee7b750;}
.fi.amber:focus{border-color:var(--p1);box-shadow:0 0 0 3px #fde68a60;}
.fi-sm{font-size:13px;padding:8px 11px;}
select.fi{cursor:pointer;}
.label{font-size:11px;color:var(--txt2);font-weight:800;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.field{margin-bottom:12px;}

/* ── CATEGORY PILL ── */
.cat-pill{display:inline-flex;align-items:center;gap:4px;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:800;border:1.5px solid;}
.cat-fitness{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.cat-reading{background:#eff6ff;color:#1e40af;border-color:#93c5fd;}
.cat-health{background:#f0fdf4;color:#166534;border-color:#86efac;}
.cat-mindfulness{background:#fdf4ff;color:#6b21a8;border-color:#d8b4fe;}
.cat-creativity{background:#fff7ed;color:#9a3412;border-color:#fdba74;}
.cat-social{background:#fdf2f8;color:#9d174d;border-color:#f9a8d4;}
.cat-other{background:#f8fafc;color:#475569;border-color:#cbd5e1;}

/* ── TABS ── */
.tabs{display:flex;background:var(--s2);border-radius:var(--r);padding:4px;margin-bottom:1rem;border:1.5px solid var(--bdr);}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:800;color:var(--txt3);border-radius:12px;cursor:pointer;transition:all .2s;}
.tab.active{background:#fff;color:var(--p2d);box-shadow:var(--sh);}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--bdr);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;font-size:10px;font-weight:800;color:var(--txt3);cursor:pointer;transition:color .2s;gap:3px;}
.bnav-item.active{color:var(--p2d);}
.bnav-icon{font-size:20px;line-height:1;}

/* ── LANDING ── */
.land{max-width:420px;margin:0 auto;text-align:center;padding-top:8vh;}
.biglogo{font-family:'Fredoka One',cursive;font-size:52px;line-height:1;color:var(--p2);margin-bottom:4px;}
.biglogo span{color:var(--p1);}
.tagline{color:var(--txt2);font-size:14px;margin-bottom:2rem;font-weight:700;}
.divider{text-align:center;color:var(--txt3);font-size:13px;margin:.75rem 0;font-weight:700;}
.snote{background:#fffbeb;border:1.5px solid #fde68a;border-radius:var(--rs);padding:1rem;margin-bottom:1rem;font-size:12px;color:#92400e;line-height:1.7;text-align:left;}
.snote b{color:#b45309;}
.snote a{color:var(--p2);font-weight:700;}
.snote code{background:#fef3c7;border-radius:3px;padding:1px 5px;font-size:11px;}

/* ── SETUP ── */
.setup-steps{display:flex;gap:6px;margin-bottom:1.25rem;justify-content:center;}
.step-dot{width:28px;height:6px;border-radius:3px;background:var(--bdr);}
.step-dot.done{background:var(--p2);}
.step-dot.active{background:var(--mintd);}
.step-title{font-family:'Fredoka One',cursive;font-size:22px;color:var(--txt);margin-bottom:4px;}
.step-sub{font-size:13px;color:var(--txt2);font-weight:700;margin-bottom:1.25rem;}

/* PLAYER CHIPS */
.player-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;}
.player-chip{display:flex;align-items:center;gap:6px;background:var(--s1);border:1.5px solid var(--bdr);border-radius:99px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer;}
.player-chip.active{border-color:var(--p2);background:var(--p2l);color:var(--p2d);}
.player-chip .chip-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}

/* HABIT BUILDER ROW */
.hbrow{background:var(--s2);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px;}
.hbrow-top{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.hbrow-top input{flex:1;background:#fff;border:1.5px solid var(--bdr);border-radius:var(--rxs);color:var(--txt);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:8px 11px;outline:none;}
.hbrow-top input:focus{border-color:var(--p2);}
.hbrow-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.hbrow-meta select{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--rxs);color:var(--txt2);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:5px 8px;outline:none;cursor:pointer;}
.hbrow-meta select:focus{border-color:var(--p2);}
.goal-input{display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(--bdr);border-radius:var(--rxs);padding:4px 8px;}
.goal-input span{font-size:11px;color:var(--txt3);font-weight:800;white-space:nowrap;}
.goal-input input{width:44px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:var(--txt);outline:none;text-align:center;}

/* ── HOME TAB ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0 1rem;}
.tlogo{font-family:'Fredoka One',cursive;font-size:22px;color:var(--p2);}
.tlogo em{color:var(--p1);font-style:normal;}
.liveb{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3);font-weight:700;}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--p2);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.dpill{background:#fff;border:1.5px solid var(--bdr);border-radius:99px;padding:5px 13px;font-size:12px;font-weight:800;color:var(--txt2);box-shadow:var(--sh);}
.dpill b{color:var(--acc);}

/* SCOREBOARD */
.scoreboard{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.1rem;margin-bottom:.75rem;position:relative;overflow:hidden;box-shadow:var(--sh2);}
.scoreboard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--p1),var(--mintd),var(--p2));}
.sc-grid{display:grid;gap:8px;}
.sc-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--rs);transition:background .2s;}
.sc-row:hover{background:var(--s3);}
.sc-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:16px;flex-shrink:0;border:2.5px solid #fff;box-shadow:var(--sh);}
.sc-info{flex:1;min-width:0;}
.sc-name{font-weight:800;font-size:14px;}
.sc-sub{font-size:11px;color:var(--txt3);font-weight:700;}
.sc-right{text-align:right;}
.sc-streak{font-family:'Fredoka One',cursive;font-size:22px;}
.sc-streaksub{font-size:10px;color:var(--txt3);font-weight:700;}
.sc-divider{height:1px;background:var(--bdr);margin:2px 0;}
.overall-goal-row{margin-top:10px;padding-top:10px;border-top:1.5px dashed var(--bdr);}
.og-label{font-size:11px;font-weight:800;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
.og-bar-wrap{position:relative;}
.og-bar-track{height:14px;background:var(--s3);border-radius:99px;overflow:hidden;border:1.5px solid var(--bdr);position:relative;}
.og-bar-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.34,1.56,.64,1);position:relative;}
.og-bar-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:800;color:#fff;mix-blend-mode:multiply;pointer-events:none;}
.og-names{display:flex;justify-content:space-between;font-size:11px;font-weight:800;margin-top:4px;}

/* TAUNT */
.taunt{background:linear-gradient(135deg,#fffbeb,#fef9c3);border:1.5px solid #fcd34d;border-radius:var(--r);padding:.85rem 1rem;margin-bottom:.75rem;display:flex;align-items:center;gap:10px;box-shadow:var(--sh);}
.taunt-ico{font-size:26px;flex-shrink:0;}
.taunt-txt{font-size:13px;font-weight:700;color:#92400e;line-height:1.45;}

/* HABIT CARDS */
.habit-card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);transition:border-color .25s,box-shadow .25s;}
.habit-card+.habit-card{margin-top:.65rem;}
.habit-card.done-p1{border-color:var(--p1);background:var(--p1ll);box-shadow:0 2px 12px #f59e0b20;}
.habit-card.done-p2{border-color:var(--p2);background:var(--p2ll);box-shadow:0 2px 12px #10b98120;}
.hc-top{display:flex;align-items:center;gap:10px;padding:11px 13px;}
.hc-check{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--bdr);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:16px;color:transparent;box-shadow:0 1px 4px #0001;}
.hc-check:hover{transform:scale(1.15);}
.hc-check.cp1:hover{border-color:var(--p1);}
.hc-check.cp2:hover{border-color:var(--p2);}
.hc-check.ck1{background:var(--p1);border-color:var(--p1d);color:#fff;box-shadow:0 2px 0 var(--p1d);}
.hc-check.ck2{background:var(--p2);border-color:var(--p2d);color:#fff;box-shadow:0 2px 0 var(--p2d);}
.hc-info{flex:1;min-width:0;}
.hc-name{font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hc-meta{display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap;}
.hc-streak{font-size:11px;font-weight:700;color:var(--txt3);}
.hc-extra{background:#fff;border:1.5px solid var(--bdr);border-radius:8px;color:var(--txt3);font-size:11px;font-weight:800;padding:4px 8px;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s;white-space:nowrap;}
.hc-extra.e1:hover{border-color:var(--p1);color:var(--p1d);background:var(--p1l);}
.hc-extra.e2:hover{border-color:var(--p2);color:var(--p2d);background:var(--p2l);}

/* PUZZLE PROGRESS */
.puzzle-wrap{padding:0 13px 12px;}
.puz-label{font-size:10px;color:var(--txt3);font-weight:800;letter-spacing:.3px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.puz-label span{background:#fff;border:1.5px solid var(--bdr);border-radius:99px;padding:2px 8px;font-size:10px;}
.puzzle-grid{display:flex;flex-wrap:wrap;gap:2px;}

/* Individual puzzle piece using clip-path */
.puz-piece{width:20px;height:20px;position:relative;cursor:default;transition:transform .3s cubic-bezier(.34,1.56,.64,1),filter .3s;}
.puz-piece svg{width:100%;height:100%;display:block;}
.puz-piece.filled.pop{animation:puzpop .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes puzpop{0%{transform:scale(0) rotate(-15deg);}60%{transform:scale(1.3) rotate(3deg);}100%{transform:scale(1) rotate(0);};}
.puz-piece.milestone-piece{filter:drop-shadow(0 0 3px #f43f5e80);}

/* QUOTE */
.quote-strip{background:linear-gradient(135deg,var(--p2ll),#f0fdf4);border-left:3px solid var(--p2);border-radius:0 var(--rs) var(--rs) 0;padding:7px 11px;margin:0 13px 10px;font-size:12px;font-weight:700;color:var(--p2d);font-style:italic;}

/* ── WEEKLY SUMMARY ── */
.week-card{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:.75rem;box-shadow:var(--sh);}
.week-title{font-family:'Fredoka One',cursive;font-size:18px;color:var(--txt);margin-bottom:1rem;}
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.week-stat{background:var(--s2);border-radius:var(--rs);padding:.85rem;text-align:center;border:1.5px solid var(--bdr);}
.week-stat-num{font-family:'Fredoka One',cursive;font-size:28px;}
.week-stat-lbl{font-size:11px;color:var(--txt3);font-weight:700;margin-top:2px;}
.week-bar-row{margin-bottom:8px;}
.week-bar-lbl{display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:4px;}
.week-bar-track{height:10px;background:var(--s3);border-radius:99px;overflow:hidden;border:1.5px solid var(--bdr);}
.week-bar-fill{height:100%;border-radius:99px;transition:width .6s ease;}
.day-heatmap{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:.75rem;}
.hm-day{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:1.5px solid var(--bdr);}
.hm-day.hm-none{background:var(--s2);color:var(--txt4);}
.hm-day.hm-p1{background:var(--p1l);color:var(--p1d);border-color:var(--p1);}
.hm-day.hm-p2{background:var(--p2l);color:var(--p2d);border-color:var(--p2);}
.hm-day.hm-both{background:linear-gradient(135deg,var(--p1l) 50%,var(--p2l) 50%);border-color:var(--mintd);}
.hm-day.hm-fut{background:var(--s3);color:var(--txt4);}
.hm-day.hm-today{outline:2px solid var(--acc);outline-offset:1px;}
.hm-lbl{font-size:10px;color:var(--txt3);font-weight:800;text-align:center;margin-bottom:4px;}

/* ── PLAYERS TAB ── */
.player-section{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:.75rem;box-shadow:var(--sh);}
.ps-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1.5px solid var(--bdr);}
.ps-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:18px;border:2.5px solid #fff;box-shadow:var(--sh);}
.ps-name{font-family:'Fredoka One',cursive;font-size:18px;}
.ps-role{font-size:11px;font-weight:700;color:var(--txt3);}
.ps-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.75rem;}
.ps-stat{background:var(--s2);border-radius:var(--rs);padding:.7rem;text-align:center;border:1.5px solid var(--bdr);}
.ps-stat-n{font-family:'Fredoka One',cursive;font-size:22px;}
.ps-stat-l{font-size:10px;color:var(--txt3);font-weight:700;}
.habit-progress-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.hpr-name{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hpr-track{flex:2;height:8px;background:var(--s3);border-radius:99px;overflow:hidden;border:1px solid var(--bdr);}
.hpr-fill{height:100%;border-radius:99px;}
.hpr-val{font-size:11px;font-weight:800;color:var(--txt2);white-space:nowrap;min-width:40px;text-align:right;}

/* ── ROOM BOX ── */
.rbox{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--rs);padding:.85rem 1rem;margin-bottom:.75rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;box-shadow:var(--sh);}
.rcode{font-family:'Fredoka One',cursive;font-size:24px;letter-spacing:4px;color:var(--p2);}
.rlbl{font-size:11px;color:var(--txt3);font-weight:700;width:100%;}

/* ── CALENDAR ── */
.calsec{background:var(--s1);border:1.5px solid var(--bdr);border-radius:var(--r);padding:1.25rem;margin-bottom:.75rem;box-shadow:var(--sh);}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:.85rem;}
.cal-title{font-family:'Fredoka One',cursive;font-size:17px;}
.calleg{display:flex;gap:8px;flex-wrap:wrap;}
.legit{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--txt2);font-weight:700;}
.legdot{width:11px;height:11px;border-radius:4px;flex-shrink:0;}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day-lbl{font-size:9px;font-weight:800;color:var(--txt4);text-align:center;padding-bottom:3px;}
.cday{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;border:1.5px solid transparent;transition:transform .15s;}
.cday:hover{transform:scale(1.1);}
.cday.fut{background:var(--s3);color:var(--txt4);}
.cday.emp{background:#fff;color:var(--txt3);border:1.5px dashed var(--bdr);}
.cday.g1{background:var(--p1l);color:var(--p1d);border-color:var(--p1);}
.cday.g2{background:var(--p2l);color:var(--p2d);border-color:var(--p2);}
.cday.gb{background:linear-gradient(135deg,var(--p1l) 50%,var(--p2l) 50%);border-color:var(--mintd);}
.cday.gp{background:#fce7f3;color:#be185d;border-color:#f9a8d4;opacity:.65;}
.cday.tod{outline:2.5px solid var(--acc);outline-offset:2px;}

/* ── WINNER ── */

// ── FIREBASE ──────────────────────────────────────
let db=null,dbRef=null,unsubFn=null,state=null,lastSnap='';
const LS='habitduel_v7_';
function initDB(){
  if(FIREBASE_CONFIG.apiKey==='PASTE_YOUR_API_KEY'){console.warn('Firebase config not set!');return false;}
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);

  }catch(e){console.error('❌ Firebase init error:',e);return false;}
}
const hasDB=initDB();
function pushState(){lsSave(state.code,state);if(hasDB&&dbRef)dbRef.set(state).catch(()=>{});}
function listenRoom(code,cb){
  if(unsubFn){unsubFn();unsubFn=null;}
  if(hasDB){
    const ref=db.ref('rooms/'+code);dbRef=ref;
    ref.on('value',snap=>{const v=snap.val();if(v){const s=JSON.stringify(v);if(s!==lastSnap){lastSnap=s;lsSave(code,v);cb(v);}}});
    unsubFn=()=>ref.off('value');
  } else {
    const iv=setInterval(()=>{const f=lsLoad(code);if(f){const s=JSON.stringify(f);if(s!==lastSnap){lastSnap=s;cb(f);}}},2000);

    document.getElementById('liveLbl').textContent='local';
  }
}
function lsSave(c,d){try{localStorage.setItem(LS+c,JSON.stringify(d));}catch(e){}}
function lsLoad(c){try{return JSON.parse(localStorage.getItem(LS+c));}catch(e){return null;}}

// ── UTILS ─────────────────────────────────────────
function td(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addD(dt,n){const d=new Date(dt+'T00:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function since(dt){const s=new Date(dt+'T00:00:00'),n=new Date();n.setHours(0,0,0,0);return Math.floor((n-s)/86400000);}
function inits(nm){return(nm||'?').trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}
function showS(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

// ── FIREWORKS ─────────────────────────────────────
const cnv=document.getElementById('fw'),cx=cnv.getContext('2d');
let pts=[],fid=null;
function rsz(){cnv.width=innerWidth;cnv.height=innerHeight;}
window.addEventListener('resize',rsz);rsz();
function boom(x,y,cols){for(let i=0;i<85;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*7;pts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,alpha:1,col:cols[i%cols.length],sz:2+Math.random()*4.5,g:.1,dec:.011+Math.random()*.013});}if(!fid)floop();}
function floop(){cx.clearRect(0,0,cnv.width,cnv.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.alpha-=p.dec;p.vx*=.98;cx.globalAlpha=Math.max(0,p.alpha);cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.sz,0,Math.PI*2);cx.fill();});cx.globalAlpha=1;pts=pts.filter(p=>p.alpha>0);if(pts.length)fid=requestAnimationFrame(floop);else{fid=null;cx.clearRect(0,0,cnv.width,cnv.height);}}
function celebrate(pi){const palettes=[['#fbbf24','#f59e0b','#fde68a','#fb923c','#fff'],['#34d399','#10b981','#6ee7b7','#a7f3d0','#fff'],['#a78bfa','#8b5cf6','#c4b5fd','#ddd6fe','#fff'],['#fb923c','#f97316','#fdba74','#fef3c7','#fff'],['#60a5fa','#3b82f6','#93c5fd','#eff6ff','#fff']];const c=palettes[pi%palettes.length];[{x:.25,y:.3},{x:.75,y:.3},{x:.5,y:.18},{x:.5,y:.55}].forEach((s,i)=>setTimeout(()=>boom(cnv.width*s.x,cnv.height*s.y,c),i*160));}
function emojiConf(pi){const sets=[['🌟','⭐','✨','🎉','🔥'],['🌿','💚','✨','🎊','⚡'],['💜','✨','🎊','🌸','⭐'],['🔶','✨','🎉','🔥','⭐'],['💙','✨','🎊','⭐','🌊']];const em=sets[pi%sets.length];for(let i=0;i<16;i++){const el=document.createElement('div');el.className='econf';el.textContent=em[Math.floor(Math.random()*em.length)];el.style.cssText=`left:${Math.random()*100}vw;top:-30px;font-size:${14+Math.random()*14}px;animation-delay:${Math.random()*1.2}s;`;document.body.appendChild(el);setTimeout(()=>el.remove(),4000);}}

// ── AUDIO ─────────────────────────────────────────
function playSound(type){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);if(type==='check'){osc.frequency.setValueAtTime(523,ctx.currentTime);osc.frequency.setValueAtTime(659,ctx.currentTime+.1);osc.frequency.setValueAtTime(784,ctx.currentTime+.2);g.gain.setValueAtTime(.25,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.5);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.5);}else if(type==='win'){[523,659,784,1047].forEach((f,i)=>{const o2=ctx.createOscillator(),g2=ctx.createGain();o2.connect(g2);g2.connect(ctx.destination);o2.frequency.value=f;g2.gain.setValueAtTime(.2,ctx.currentTime+i*.12);g2.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.12+.3);o2.start(ctx.currentTime+i*.12);o2.stop(ctx.currentTime+i*.12+.35);});}else if(type==='extra'){osc.frequency.setValueAtTime(880,ctx.currentTime);osc.frequency.setValueAtTime(1100,ctx.currentTime+.08);g.gain.setValueAtTime(.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.25);}}catch(e){}}

// ── PUZZLE PIECE SVG ──────────────────────────────
function puzzlePieceSVG(filled, color, isMilestone, isToday){
  const base = filled ? color : (isToday ? '#e2e8f0' : '#f1f5f9');
  const stroke = filled ? color : '#cbd5e1';
  const opacity = filled ? '1' : '0.6';
  const glowColor = isMilestone ? '#f43f5e' : 'none';
  // Simple puzzle-like shape using path
  return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    ${isMilestone ? `<filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>` : ''}
    <path d="M3,3 L9,3 Q9,1 10.5,1 Q12,1 12,3 L18,3 Q21,3 21,6 L21,9 Q23,9 23,10.5 Q23,12 21,12 L21,18 Q21,21 18,21 L12,21 Q12,23 10.5,23 Q9,23 9,21 L3,21 Q0,21 0,18 L0,12 Q-2,12 -2,10.5 Q-2,9 0,9 L0,6 Q0,3 3,3 Z"
      fill="${base}" stroke="${stroke}" stroke-width="1.2" opacity="${opacity}"
      ${isMilestone ? 'filter="url(#glow)"' : ''}/>
    ${filled && isMilestone ? `<circle cx="12" cy="12" r="3" fill="white" opacity="0.7"/>` : ''}
  </svg>`;
}

// ── SETUP FLOW ────────────────────────────────────
function goSetup(){
  setupData={challengeDays:30,overallGoal:21,players:[{name:'',habits:[{name:'',category:'other',goal:21}]}],currentStep:0};
  renderSetupStep();showS('sSetup');
}

function renderSetupStep(){
  const step=setupData.currentStep;
  const dots=document.getElementById('setupDots');
  dots.innerHTML=SETUP_STEPS.map((_,i)=>`<div class="step-dot ${i<step?'done':i===step?'active':''}"></div>`).join('');
  document.getElementById('setupBack').style.display=step>0?'flex':'none';
  document.getElementById('setupNext').textContent=step===SETUP_STEPS.length-1?'🚀 Start the Duel!':'Continue →';
  const titles=['⚙️ Challenge Settings','👥 Add Players','🌱 Set Habits','✅ Review & Launch'];
  const subs=['Set your challenge length and overall goal','Add yourself and your partner (or more!)','Add habits for each player with goals','Everything looks good? Let\'s go!'];
  document.getElementById('stepTitle').textContent=titles[step];
  document.getElementById('stepSub').textContent=subs[step];
  const body=document.getElementById('setupBody');
  if(step===0) renderStep0(body);
  else if(step===1) renderStep1(body);
  else if(step===2) renderStep2(body);
  else renderStep3(body);
}

function renderStep0(body){
  body.innerHTML=`<div class="card">
    <div class="field"><span class="label">Challenge length (days)</span>
      <input class="fi" id="s0days" type="number" min="7" max="365" value="${setupData.challengeDays}" placeholder="30"/>
    </div>
    <div class="field"><span class="label">Overall goal (days to complete)</span>
      <input class="fi" id="s0goal" type="number" min="1" max="${setupData.challengeDays}" value="${setupData.overallGoal}" placeholder="21"/>
      <div style="font-size:12px;color:var(--txt3);margin-top:4px;font-weight:700;">Complete at least this many days to win 🏆</div>
    </div>
  </div>`;
}

function renderStep1(body){
  body.innerHTML=`<div id="playersList"></div>
  <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="addPlayer()">+ Add another player</button>`;
  renderPlayersList();
}

function renderPlayersList(){
  const list=document.getElementById('playersList');
  if(!list)return;
  list.innerHTML=setupData.players.map((p,i)=>`
    <div class="card" style="margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div class="sc-av ${PLAYER_COLORS[i%5]}" style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:14px;">${p.name?inits(p.name):'?'}</div>
        <div style="flex:1;font-family:'Fredoka One',cursive;font-size:16px;color:var(--txt2);">Player ${i+1}${i===0?' (You)':''}</div>
        ${i>1?`<button class="btn btn-danger btn-sm" onclick="removePlayer(${i})">✕</button>`:''}
      </div>
      <input class="fi amber" type="text" placeholder="Name" maxlength="18" value="${esc(p.name)}" oninput="setupData.players[${i}].name=this.value;renderAv(${i},this.value)" style="${i===0?'':''}"/>
    </div>`).join('');
}

function renderAv(i,name){const av=document.querySelectorAll('#playersList .sc-av')[i];if(av)av.textContent=name?inits(name):'?';}
function addPlayer(){if(setupData.players.length>=5){toast('Max 5 players!');return;}setupData.players.push({name:'',habits:[{name:'',category:'other',goal:setupData.overallGoal}]});renderPlayersList();}
function removePlayer(i){setupData.players.splice(i,1);renderPlayersList();}

function renderStep2(body){
  // Read names from step 1 inputs if not yet saved
  const inputs=document.querySelectorAll('#playersList input');
  inputs.forEach((inp,i)=>{if(setupData.players[i])setupData.players[i].name=inp.value.trim();});
  body.innerHTML=`
    <div class="tabs" id="habitTabs">${setupData.players.map((p,i)=>`<div class="tab${i===0?' active':''}" onclick="switchHabitTab(${i})">${p.name||'P'+(i+1)}</div>`).join('')}</div>
    <div id="habitBody"></div>`;
  renderHabitEditor(0);
}

let activeHabitTab=0;
function switchHabitTab(i){activeHabitTab=i;document.querySelectorAll('#habitTabs .tab').forEach((t,j)=>t.classList.toggle('active',j===i));renderHabitEditor(i);}

function renderHabitEditor(pi){
  const p=setupData.players[pi];

  body.innerHTML=`<div id="habitsFor${pi}"></div><button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="addHabitToPlayer(${pi})">+ Add habit for ${esc(p.name||'Player '+(pi+1))}</button>`;
  renderHabitsFor(pi);

function renderHabitsFor(pi){
  const p=setupData.players[pi];

function setupPrev(){if(setupData.currentStep>0){setupData.currentStep--;renderSetupStep();}}

function setupNext(){
  const step=setupData.currentStep;
  if(step===0){
    const days=parseInt(document.getElementById('s0days').value)||30;
    const goal=parseInt(document.getElementById('s0goal').value)||21;
    if(days<7){toast('Minimum 7 days!');return;}
    if(goal>days){toast('Goal can\'t exceed challenge length!');return;}
    setupData.challengeDays=days;setupData.overallGoal=goal;
  } else if(step===1){
    const inputs=document.querySelectorAll('#playersList input');
    let ok=true;
    inputs.forEach((inp,i)=>{
      const v=inp.value.trim();
      if(!v){toast('All players need names!');ok=false;return;}
      if(setupData.players[i])setupData.players[i].name=v;
    });
    if(!ok)return;
    if(setupData.players.length<2){toast('Need at least 2 players!');return;}
  } else if(step===2){
    for(const p of setupData.players){
      for(const h of p.habits){if(!h.name.trim()){toast('All habits need names!');return;}}
    }
  } else if(step===3){
    createChallenge();return;
  }
  setupData.currentStep++;renderSetupStep();
}

// ── CREATE ────────────────────────────────────────
function createChallenge(){
  const code=genCode();
  state={
    code,
    startDate:td(),
    challengeDays:setupData.challengeDays,
    overallGoal:setupData.overallGoal,
    players:setupData.players.map(p=>({
      name:p.name,
      habits:p.habits.map(h=>({name:h.name,category:h.category||'other',goal:h.goal||setupData.overallGoal,logs:{},extra:{}}))
    }))
  };
  showS('sLoad');pushState();
  setTimeout(()=>{listenRoom(code,d=>{state=d;renderMain();});showS('sMain');renderMain();toast('🎉 Duel started! Code: '+code);},700);
}

// ── JOIN ──────────────────────────────────────────
function joinRoom(){
  const code=document.getElementById('joinCode').value.trim().toUpperCase();
  if(code.length<4){toast('Enter a valid room code!');return;}
  showS('sLoad');
  if(hasDB){
    db.ref('rooms/'+code).get().then(snap=>{const v=snap.val();if(v)go(code,v);else{const ls=lsLoad(code);if(ls)go(code,ls);else{toast('Room not found!');showS('sLand');}}}).catch(()=>{const ls=lsLoad(code);if(ls)go(code,ls);else{toast('Connection error!');showS('sLand');}});
  } else {const ls=lsLoad(code);if(ls)go(code,ls);else{toast('Room not found — set up Firebase first!');showS('sLand');}}
}
function go(code,data){state=data;listenRoom(code,d=>{state=d;renderMain();});showS('sMain');renderMain();}

// ── TOGGLE ────────────────────────────────────────
function toggleHabit(pi,hi){
  const p=state.players[pi],h=p.habits[hi],t=td();
  const wasAll=allDone(pi);
  if(h.logs&&h.logs[t]){delete h.logs[t];if(h.extra)delete h.extra[t];}
  else{
    if(!h.logs)h.logs={};if(!h.extra)h.extra={};
    h.logs[t]=true;h.extra[t]=1;
    playSound('check');
    setTimeout(()=>{
      celebrate(pi);emojiConf(pi);
      toast(rnd(QUOTES));
      if(allDone(pi)&&!wasAll){playSound('win');setTimeout(()=>{celebrate(pi);toast('🎉 '+p.name+' crushed ALL habits today!');},500);}
    },100);
  }
  pushState();renderMain();
}
function logExtra(pi,hi){
  const p=state.players[pi],h=p.habits[hi],t=td();
  if(!h.logs)h.logs={};if(!h.extra)h.extra={};
  h.logs[t]=true;h.extra[t]=(h.extra[t]||1)+1;
  playSound('extra');celebrate(pi);
  toast('💪 +1 extra for '+p.name+'!');
  pushState();renderMain();
}
function allDone(pi){const t=td();return state.players[pi].habits.every(h=>h.logs&&h.logs[t]);}

// ── CALCS ─────────────────────────────────────────
function pStreak(pi){
  let s=0,d=td();
  while(state.players[pi].habits.some(h=>h.logs&&h.logs[d])){s++;d=addD(d,-1);}
  return s;
}
function hStreak(h){let s=0,d=td();while(h.logs&&h.logs[d]){s++;d=addD(d,-1);}return s;}
function hDone(h){
  if(!h.logs||!state)return 0;
  const start=new Date(state.startDate+'T00:00:00');
  return Object.keys(h.logs).filter(d=>{const dx=new Date(d+'T00:00:00');return dx>=start&&dx<=new Date();}).length;
}
function pDaysDone(pi){
  // Days where player completed ALL habits
  if(!state)return 0;
  const p=state.players[pi];
  const allDates=new Set();
  p.habits.forEach(h=>{if(h.logs)Object.keys(h.logs).forEach(d=>allDates.add(d));});
  const start=new Date(state.startDate+'T00:00:00');
  return[...allDates].filter(d=>{
    const dx=new Date(d+'T00:00:00');
    return dx>=start&&dx<=new Date()&&p.habits.every(h=>h.logs&&h.logs[d]);
  }).length;
}
function pPartialDays(pi){
  if(!state)return 0;
  const p=state.players[pi];
  const allDates=new Set();
  p.habits.forEach(h=>{if(h.logs)Object.keys(h.logs).forEach(d=>allDates.add(d));});
  const start=new Date(state.startDate+'T00:00:00');
  return[...allDates].filter(d=>{const dx=new Date(d+'T00:00:00');return dx>=start&&dx<=new Date();}).length;
}

// ── CURRENT TAB ───────────────────────────────────
let activeTab=0;
function switchTab(i){
  activeTab=i;
  ['tabHome','tabWeekly','tabPlayers','tabCalendar'].forEach((id,j)=>document.getElementById(id).style.display=j===i?'block':'none');

}

// ── RENDER MAIN ───────────────────────────────────
function renderMain(){
  if(!state)return;
  const dn=Math.min(since(state.startDate)+1,state.challengeDays);
  document.getElementById('dayN').textContent=dn;
  document.getElementById('totalDays').textContent=state.challengeDays;
  document.getElementById('rDisp').textContent=state.code;
  if(activeTab===0)renderHome();
  else if(activeTab===1)renderWeekly();
  else if(activeTab===2)renderPlayers();
  else renderCalendar();
}

function renderHome(){
  renderScoreboard();
  renderTaunt();
  renderHabits();
  renderWinner();
}

function renderScoreboard(){
  const el=document.getElementById('scoreboard');
  const goal=state.overallGoal;
  let rows='';
  state.players.forEach((p,i)=>{
    const s=pStreak(i),d=pDaysDone(i);

function renderTaunt(){
  const sec=document.getElementById('tauntSec');
  if(state.players.length<2){sec.style.display='none';return;}
  const d0=pDaysDone(0),d1=pDaysDone(1),s0=pStreak(0),s1=pStreak(1);
  if(Math.abs(d0-d1)<=1&&Math.abs(s0-s1)<=1){sec.style.display='none';return;}
  let icon,msg,leader,loser;
  if(d0>d1+1||s0>s1+1){leader=state.players[0].name;loser=state.players[1].name;}
  else if(d1>d0+1||s1>s0+1){leader=state.players[1].name;loser=state.players[0].name;}
  else{sec.style.display='none';return;}
  const t=rnd(TAUNTS_AHEAD);icon=t[0];msg=leader+': '+t[1];
  sec.style.display='block';
  sec.innerHTML=`<div class="taunt"><div class="taunt-ico">${icon}</div><div class="taunt-txt">${msg}</div></div>`;
}

function renderHabits(){
  const t=td();
  const list=document.getElementById('habitsList');

  state.players.forEach((p,pi)=>{

    </div>`;
    p.habits.forEach((h,hi)=>{
      const done=!!(h.logs&&h.logs[t]);
      const ex=h.extra&&h.extra[t]?h.extra[t]:0;
      const hs=hStreak(h);
      const hd=hDone(h);
      const hGoal=h.goal||state.overallGoal;
      const catIcon=CAT_ICONS[h.category]||'⭐';
      const card=document.createElement('div');
      card.className=`habit-card${done?(pi===0?' done-p1':pi===1?' done-p2':''):''}`;
      card.innerHTML=`
        <div class="hc-top">
          <button class="hc-check cp${pi+1}${done?' ck'+(pi+1):''}" onclick="toggleHabit(${pi},${hi})">${done?'✓':''}</button>

              <span class="cat-pill cat-${h.category}">${CATS[h.category]||'⭐ Other'}</span>
            </div>
          </div>
          ${done?`<button class="hc-extra e${pi+1}" onclick="logExtra(${pi},${hi})">+1${ex>1?' ('+ex+'×)':''}</button>`:''}

        <div class="puzzle-wrap">

        </div>`;

      // Render puzzle pieces after DOM insert
      requestAnimationFrame(()=>renderPuzzle(pi,hi,h,hGoal));

function renderPuzzle(pi,hi,h,hGoal){
  const grid=document.getElementById(`puz_${pi}_${hi}`);
  if(!grid)return;
  grid.innerHTML='';
  const colors=['#f59e0b','#10b981','#8b5cf6','#f97316','#3b82f6'];
  const col=colors[pi%colors.length];
  const total=hGoal;
  for(let b=0;b<total;b++){
    const dateB=addD(state.startDate,b);
    const filled=!!(h.logs&&h.logs[dateB]);
    const isToday=dateB===td();
    const isMilestone=b===Math.floor(hGoal*0.7); // 70% milestone
    const piece=document.createElement('div');
    piece.className=`puz-piece${filled?' filled':''}${isMilestone?' milestone-piece':''}${filled&&isToday?' pop':''}`;
    piece.title=`Day ${b+1}`;
    piece.innerHTML=puzzlePieceSVG(filled,col,isMilestone,isToday);
    grid.appendChild(piece);
  }
}

function renderWinner(){
  const sec=document.getElementById('winSec');
  const dn=since(state.startDate)+1;
  const winners=state.players.filter((_,i)=>pDaysDone(i)>=state.overallGoal);
  if(winners.length===0&&dn<=state.challengeDays){sec.style.display='none';return;}
  sec.style.display='block';
  if(winners.length>1){
    sec.innerHTML=`<div class="winbanner"><div class="wtroph">🤝</div><div class="wtxt">Everyone wins!</div><div class="wsub">All players hit their goal. Legends all round! 🌿</div></div>`;
  } else if(winners.length===1){
    sec.innerHTML=`<div class="winbanner"><div class="wtroph">🥇</div><div class="wtxt">${esc(winners[0].name)} wins!</div><div class="wsub">${esc(winners[0].name)} hit ${state.overallGoal} days first. Absolute champion! 🔥</div></div>`;
  } else {
    const best=state.players.reduce((a,_,i)=>pDaysDone(i)>pDaysDone(a)?i:a,0);
    sec.innerHTML=`<div class="winbanner"><div class="wtroph">🏁</div><div class="wtxt">Challenge over!</div><div class="wsub">${esc(state.players[best].name)} leads with most days completed.</div></div>`;
  }
}

      <div class="cal-title">📅 ${total}-Day Map</div>
      <div class="calleg">
        ${state.players.slice(0,2).map((p,i)=>`<div class="legit"><div class="legdot" style="background:${i===0?'var(--p1l)':'var(--p2l)'};border:1.5px solid ${i===0?'var(--p1)':'var(--p2)'};"></div>${esc(p.name)}</div>`).join('')}
        ${state.players.length>=2?`<div class="legit"><div class="legdot" style="background:linear-gradient(135deg,var(--p1l) 50%,var(--p2l) 50%);border:1.5px solid var(--mintd);"></div>Both</div>`:''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;">
      ${DAY_LABELS.map(l=>`<div class="cal-day-lbl">${l}</div>`).join('')}
    </div>
    <div class="calgrid">
      ${Array(startDow).fill('<div></div>').join('')}
      ${Array.from({length:total},(_,i)=>{
        const d=addD(state.startDate,i);
        const isT=d===t,isFut=d>t;
        const p0all=state.players[0]?.habits.every(h=>h.logs&&h.logs[d]);
        const p1all=state.players[1]?.habits.every(h=>h.logs&&h.logs[d]);
        const anyDone=state.players.some(p=>p.habits.some(h=>h.logs&&h.logs[d]));
        let cls;
        if(isFut)cls='fut';
        else if(p0all&&p1all&&state.players.length>=2)cls='gb';
        else if(p0all)cls='g1';
        else if(p1all)cls='g2';
        else if(anyDone)cls='gp';
        else cls='emp';
        return`<div class="cday ${cls}${isT?' tod':''}" title="Day ${i+1}">${i+1}</div>`;
      }).join('')}
    </div>
  </div>
  <div class="resetlk"><button onclick="resetAll()">🔄 Reset challenge</button></div>`;
  document.getElementById('calContent').innerHTML=html;
}

function copyCode(){const c=state?.code||'';navigator.clipboard.writeText(c).then(()=>toast('📋 Code copied!')).catch(()=>toast('Code: '+c));}

// Leave duel WITHOUT deleting data — just exit to home screen
function leaveDuel(){
  if(!confirm('Leave this duel? Your progress is saved — rejoin anytime with the room code.'))return;
  if(unsubFn){unsubFn();unsubFn=null;}
  // Clear only the localStorage session so auto-restore doesn't kick in
  if(state)localStorage.removeItem(LS+state.code);
  state=null;dbRef=null;lastSnap='';activeTab=0;
  document.getElementById('joinCode').value='';
  // Switch back to nav tab 0 visually
  document.querySelectorAll('.bnav-item').forEach((el,j)=>el.classList.toggle('active',j===0));
  ['tabHome','tabWeekly','tabPlayers','tabCalendar'].forEach((id,j)=>document.getElementById(id).style.display=j===0?'block':'none');
  showS('sLand');
  toast('👋 Left the duel — rejoin anytime with your code!');
}

// Reset = permanently delete all data
function resetAll(){
  if(!confirm('⚠️ This will DELETE all progress permanently for everyone. Are you sure?'))return;
  if(hasDB&&dbRef)dbRef.remove().catch(()=>{});
  if(state)localStorage.removeItem(LS+state.code);
  if(unsubFn){unsubFn();unsubFn=null;}
  state=null;dbRef=null;lastSnap='';activeTab=0;
  document.getElementById('joinCode').value='';
  document.querySelectorAll('.bnav-item').forEach((el,j)=>el.classList.toggle('active',j===0));
  ['tabHome','tabWeekly','tabPlayers','tabCalendar'].forEach((id,j)=>document.getElementById(id).style.display=j===0?'block':'none');
  showS('sLand');
}

// ── INIT ──────────────────────────────────────────
let lastSavedCode = null;

function rejoinLast(){
  if(!lastSavedCode)return;
  const data=lsLoad(lastSavedCode);
  if(data)go(lastSavedCode,data);
  else{
    // Try Firebase
    showS('sLoad');
    if(hasDB){
      db.ref('rooms/'+lastSavedCode).get().then(snap=>{const v=snap.val();if(v)go(lastSavedCode,v);else{toast('Room not found!');showS('sLand');}}).catch(()=>{toast('Connection error!');showS('sLand');});
    } else {toast('Room not found!');showS('sLand');}
  }
}

(function(){
  // Check Firebase config
  const fbReady = FIREBASE_CONFIG.apiKey !== 'PASTE_YOUR_API_KEY';
  // Find any saved session codes
  const keys=Object.keys(localStorage).filter(k=>k.startsWith(LS)&&k.length>LS.length);
  if(keys.length){
    try{
      const code = keys[keys.length-1].replace(LS,'');
      const data=JSON.parse(localStorage.getItem(keys[keys.length-1]));
      if(data&&data.code&&data.players&&data.players.length>=2){
        lastSavedCode=code;
        // Show rejoin button instead of auto-restoring
        const box=document.getElementById('rejoinBox');
        const btn=document.getElementById('rejoinBtn');
        if(box&&btn){
          const names=data.players.map(p=>p.name).join(' vs ');
          btn.textContent=`↩️ Rejoin: ${names} (${code})`;
          box.style.display='block';
        }
      }
    }catch(e){}
  }
})();
</script>
